<!DOCTYPE html>
<html lang="sv">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>PMOPOLY Companion</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'Segoe UI', system-ui, sans-serif; background: #0f1923; color: #e0e0e0; min-height: 100vh; }

/* Views */
.view { display: none; }
.view.active { display: flex; flex-direction: column; min-height: 100vh; }

/* ── Lobby ── */
.lobby { align-items: center; justify-content: center; padding: 20px; gap: 20px; }
.lobby h1 { color: #f0c929; font-size: 28px; }
.lobby p { color: #999; margin-bottom: 10px; }
.lobby-card { background: #1a2736; border-radius: 12px; padding: 24px; width: 100%; max-width: 400px; }
.lobby-card h2 { color: #f0c929; margin-bottom: 12px; font-size: 18px; }
.lobby-card input, .lobby-card select { width: 100%; padding: 12px; border-radius: 8px; border: 1px solid #334; background: #0f1923; color: #e0e0e0; font-size: 16px; margin-bottom: 10px; }
.lobby-card button { width: 100%; padding: 14px; border-radius: 8px; border: none; font-size: 16px; font-weight: 700; cursor: pointer; margin-top: 6px; }
.btn-primary { background: #f0c929; color: #1a1a2e; }
.btn-secondary { background: #2a3a4a; color: #e0e0e0; }
.or-divider { text-align: center; color: #666; margin: 10px 0; font-size: 14px; }
.quarter-select { display: none; margin-top: 10px; }
.quarter-select.show { display: block; }
.quarter-btn { display: block; width: 100%; padding: 12px; margin-bottom: 6px; border-radius: 8px; border: 2px solid #334; background: #1a2736; color: #e0e0e0; font-size: 15px; cursor: pointer; text-align: left; }
.quarter-btn:hover { border-color: #f0c929; }
.quarter-btn .count { float: right; color: #888; font-size: 13px; }

/* ── Player View ── */
.player-view { padding: 12px; padding-bottom: 80px; }
.phase-header { background: linear-gradient(135deg, #1a2736, #243447); border-radius: 10px; padding: 14px; margin-bottom: 12px; text-align: center; }
.phase-header .phase-name { color: #f0c929; font-size: 18px; font-weight: 700; }
.phase-header .step-name { color: #4db8ff; font-size: 14px; margin-top: 4px; }

.assets-grid { display: flex; flex-direction: column; gap: 10px; }

/* Asset card */
.asset-card { background: #1a2736; border-radius: 10px; padding: 14px; border-left: 4px solid #444; }
.asset-card.pc { border-left-color: #8B7355; }
.asset-card.projects { border-left-color: #2E7D32; }
.asset-card.counters { border-left-color: #1565C0; }
.asset-card.economy { border-left-color: #f0c929; }

.asset-label { color: #999; font-size: 12px; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 6px; }
.asset-value { font-size: 16px; font-weight: 600; }
.asset-empty { color: #555; font-style: italic; cursor: pointer; padding: 8px 0; }
.asset-empty:hover { color: #f0c929; }

/* Chosen PC/project display */
.chosen-item { display: flex; align-items: center; gap: 10px; padding: 6px 0; cursor: pointer; }
.chosen-item .dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }
.chosen-item .name { font-weight: 600; }
.chosen-item .detail { color: #888; font-size: 13px; }
.chosen-item .remove-btn { margin-left: auto; color: #c0392b; cursor: pointer; font-size: 18px; padding: 0 4px; }

/* Counter row */
.counter-row { display: flex; align-items: center; justify-content: space-between; padding: 6px 0; }
.counter-row .label { font-size: 14px; }
.counter-controls { display: flex; align-items: center; gap: 8px; }
.counter-btn { width: 36px; height: 36px; border-radius: 50%; border: 2px solid #444; background: transparent; color: #e0e0e0; font-size: 20px; cursor: pointer; display: flex; align-items: center; justify-content: center; }
.counter-btn:active { background: #334; }
.counter-val { font-size: 20px; font-weight: 700; min-width: 30px; text-align: center; }

/* Project type buttons */
.proj-type-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 6px; margin-top: 8px; }
.proj-type-btn { padding: 10px 6px; border-radius: 8px; border: 2px solid #334; background: #0f1923; color: #e0e0e0; font-size: 13px; font-weight: 600; cursor: pointer; text-align: center; }
.proj-type-btn:hover { border-color: #f0c929; }

/* ── GM Dashboard ── */
.gm-view { padding: 12px; }
.gm-header { display: flex; justify-content: space-between; align-items: center; padding: 12px; background: #1a2736; border-radius: 10px; margin-bottom: 12px; }
.gm-header .room-code { font-size: 24px; font-weight: 900; color: #f0c929; letter-spacing: 4px; }
.gm-controls { display: flex; gap: 8px; }
.gm-controls button { padding: 10px 20px; border-radius: 8px; border: none; font-size: 14px; font-weight: 700; cursor: pointer; }
.btn-prev { background: #2a3a4a; color: #e0e0e0; }
.btn-next { background: #27ae60; color: white; }

.gm-phase-bar { text-align: center; padding: 8px; margin-bottom: 12px; }
.gm-phase-bar .phase { color: #f0c929; font-size: 16px; font-weight: 700; }
.gm-phase-bar .step { color: #4db8ff; font-size: 14px; }

.quarters-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 12px; }
.quarter-card { background: #1a2736; border-radius: 10px; padding: 14px; border-top: 3px solid #f0c929; }
.quarter-card h3 { color: #f0c929; margin-bottom: 8px; }
.quarter-stat { display: flex; justify-content: space-between; padding: 4px 0; font-size: 14px; }
.quarter-stat .val { font-weight: 700; }
.quarter-players { margin-top: 8px; font-size: 13px; color: #888; }
.quarter-players span { display: inline-block; background: #243447; padding: 2px 8px; border-radius: 4px; margin: 2px; }

/* ── Modal ── */
.modal-overlay { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.7); z-index: 1000; display: flex; align-items: center; justify-content: center; padding: 16px; }
.modal { background: #1a2736; border-radius: 12px; max-width: 500px; width: 100%; max-height: 80vh; overflow-y: auto; }
.modal-header { padding: 16px; border-bottom: 1px solid #334; }
.modal-header h3 { color: #f0c929; }
.modal-body { padding: 16px; }
.modal-item { padding: 12px; border-radius: 8px; border: 2px solid #334; margin-bottom: 8px; cursor: pointer; }
.modal-item:hover { border-color: #f0c929; background: #243447; }
.modal-item.selected { border-color: #27ae60; background: #1a3a2a; }
.modal-item .item-name { font-weight: 700; font-size: 15px; }
.modal-item .item-detail { color: #999; font-size: 13px; margin-top: 4px; }
.modal-footer { padding: 12px 16px; border-top: 1px solid #334; display: flex; gap: 8px; }
.modal-footer button { flex: 1; padding: 12px; border-radius: 8px; border: none; font-size: 15px; font-weight: 700; cursor: pointer; }

/* GM Table */
.gm-tab.active { background: #f0c929 !important; color: #1a1a2e !important; }
.gm-table { width: 100%; border-collapse: collapse; font-size: 13px; }
.gm-table th { background: #243447; padding: 8px 10px; text-align: left; color: #f0c929; font-size: 12px; text-transform: uppercase; position: sticky; top: 0; }
.gm-table td { padding: 6px 10px; border-bottom: 1px solid #1a2736; }
.gm-table tr:hover td { background: #1a2736; }
.status-done { color: #27ae60; font-weight: 700; }
.status-wait { color: #c0392b; }
.score-bar { display: inline-block; height: 14px; border-radius: 3px; background: linear-gradient(90deg, #27ae60, #f0c929); min-width: 4px; vertical-align: middle; margin-right: 6px; }
.help-icon { cursor: pointer; margin-left: 6px; font-size: 16px; vertical-align: middle; }
.ev-btn, .gf-btn { cursor: pointer; padding: 0 4px; color: #f0c929; font-weight: 700; user-select: none; }
.ev-btn:active, .gf-btn:active { opacity: 0.5; }

/* Klar button */
.klar-section { margin: 12px 0; text-align: center; }
.klar-btn { display: block; width: 100%; padding: 16px; border-radius: 10px; border: none; font-size: 16px; font-weight: 700; cursor: pointer; }
.klar-btn.not-done { background: #27ae60; color: white; }
.klar-btn.not-done:active { background: #219a52; }
.klar-btn.is-done { background: #243447; color: #888; cursor: default; }
.klar-undo { color: #4db8ff; cursor: pointer; font-size: 13px; margin-left: 8px; text-decoration: underline; }

/* Projected score indicator */
.projected-score { display: inline-flex; align-items: center; gap: 4px; padding: 4px 10px; border-radius: 6px; background: #243447; font-size: 14px; font-weight: 700; }
.projected-score .trend-up { color: #27ae60; }
.projected-score .trend-down { color: #e74c3c; }
.projected-score .trend-flat { color: #888; }

/* ── Quiz Modal (player) ── */
#quiz-modal-container .quiz-overlay { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.85); z-index: 2000; display: flex; align-items: center; justify-content: center; padding: 16px; }
#quiz-modal-container .quiz-modal { background: #1a2736; border-radius: 16px; max-width: 500px; width: 100%; border: 3px solid #f0c929; animation: quizPulse 0.5s ease-out; }
@keyframes quizPulse { 0% { transform: scale(0.8); opacity: 0; } 100% { transform: scale(1); opacity: 1; } }
.quiz-header { padding: 16px; text-align: center; border-bottom: 1px solid #334; }
.quiz-header h3 { color: #f0c929; font-size: 14px; text-transform: uppercase; letter-spacing: 2px; }
.quiz-timer { font-size: 48px; font-weight: 900; color: #f0c929; text-align: center; padding: 8px; transition: color 0.3s; }
.quiz-timer.urgent { color: #e74c3c; }
.quiz-timer-bar { height: 4px; background: #334; margin: 0 16px; border-radius: 2px; overflow: hidden; }
.quiz-timer-bar .fill { height: 100%; background: linear-gradient(90deg, #e74c3c, #f0c929); transition: width 0.1s linear; }
.quiz-question-text { padding: 20px 16px; font-size: 20px; font-weight: 700; text-align: center; line-height: 1.4; }
.quiz-options { padding: 0 16px 16px; display: flex; flex-direction: column; gap: 8px; }
.quiz-option { padding: 14px 16px; border-radius: 10px; border: 2px solid #334; background: #0f1923; color: #e0e0e0; font-size: 16px; font-weight: 600; cursor: pointer; text-align: left; transition: all 0.15s; }
.quiz-option:hover { border-color: #f0c929; background: #243447; }
.quiz-option.selected { border-color: #4db8ff; background: #1a3050; pointer-events: none; }
.quiz-option.correct-reveal { border-color: #27ae60; background: #1a3a2a; }
.quiz-input-row { padding: 0 16px 16px; display: flex; gap: 8px; }
.quiz-input-row input { flex: 1; padding: 14px; border-radius: 10px; border: 2px solid #334; background: #0f1923; color: #e0e0e0; font-size: 18px; }
.quiz-input-row button { padding: 14px 24px; border-radius: 10px; border: none; background: #f0c929; color: #1a1a2e; font-size: 16px; font-weight: 700; cursor: pointer; }
.quiz-feedback { text-align: center; padding: 20px; font-size: 24px; font-weight: 900; }
.quiz-feedback.correct { color: #27ae60; }
.quiz-feedback.wrong { color: #e74c3c; }

/* ── Quiz GM Tab ── */
.quiz-section { padding: 8px 0; }
.quiz-q-list { display: flex; flex-direction: column; gap: 6px; max-height: 50vh; overflow-y: auto; }
.quiz-q-item { display: flex; align-items: center; gap: 10px; padding: 10px 12px; background: #1a2736; border-radius: 8px; border-left: 3px solid #334; }
.quiz-q-item.sent { border-left-color: #27ae60; opacity: 0.6; }
.quiz-q-item .q-type { font-size: 11px; color: #888; background: #243447; padding: 2px 6px; border-radius: 4px; min-width: 24px; text-align: center; }
.quiz-q-item .q-text { flex: 1; font-size: 14px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.quiz-q-item .q-pts { color: #f0c929; font-size: 13px; font-weight: 700; min-width: 40px; text-align: right; }
.quiz-q-item .q-actions { display: flex; gap: 4px; }
.quiz-q-item .q-actions button { padding: 6px 10px; border-radius: 6px; border: none; font-size: 12px; font-weight: 700; cursor: pointer; }
.quiz-send-btn { background: #27ae60; color: white; }
.quiz-send-btn:disabled { background: #334; color: #666; cursor: not-allowed; }
.quiz-edit-btn { background: #2a3a4a; color: #e0e0e0; }
.quiz-del-btn { background: #2a3a4a; color: #e74c3c; }
.quiz-active-panel { background: #1a2736; border-radius: 10px; padding: 14px; margin-bottom: 12px; border: 2px solid #f0c929; }
.quiz-active-panel h4 { color: #f0c929; margin-bottom: 8px; }
.quiz-result-row { display: flex; justify-content: space-between; padding: 4px 0; font-size: 13px; border-bottom: 1px solid #243447; }
.quiz-form { background: #1a2736; border-radius: 10px; padding: 14px; margin-bottom: 12px; }
.quiz-form label { display: block; color: #999; font-size: 12px; text-transform: uppercase; margin-bottom: 4px; margin-top: 10px; }
.quiz-form input:not([type="radio"]), .quiz-form select, .quiz-form textarea { width: 100%; padding: 10px; border-radius: 8px; border: 1px solid #334; background: #0f1923; color: #e0e0e0; font-size: 14px; }
.quiz-form input[type="radio"] { width: auto; padding: 0; border: none; background: transparent; flex-shrink: 0; }
.quiz-form textarea { min-height: 60px; resize: vertical; }
.quiz-form .form-row { display: flex; gap: 8px; }
.quiz-form .form-row > * { flex: 1; }
input.qf-opt { flex: 1 !important; width: auto !important; min-width: 0; }
</style>
</head>
<body>

<!-- LOBBY (player only) -->
<div id="view-lobby" class="view active lobby">
    <h1>PMOPOLY</h1>
    <p>Companion App</p>

    <div class="lobby-card">
        <h2>Gå med i stadsdel</h2>
        <input type="text" id="player-name" placeholder="Ditt namn" maxlength="20">
        <input type="text" id="room-code" placeholder="Stadsdelskod (4 tecken)" maxlength="4" style="text-transform:uppercase">
        <button class="btn-primary" id="btn-join-quarter">Gå med</button>
    </div>
</div>

<!-- GM LOBBY (separate) -->
<div id="view-gm-lobby" class="view lobby">
    <h1>PMOPOLY</h1>
    <p>Game Master</p>

    <div class="lobby-card">
        <h2>Skapa stadsdelar</h2>
        <input type="number" id="gm-num-districts" value="4" min="1" max="20" placeholder="Antal stadsdelar">
        <button class="btn-primary" id="btn-create-room">Skapa nytt rum</button>
        <div class="or-divider">— eller —</div>
        <button class="btn-secondary" id="btn-load-room-setup">Ladda sparad setup</button>
    </div>
</div>

<!-- PLAYER VIEW -->
<div id="view-player" class="view player-view">
    <div class="phase-header">
        <div class="phase-name" id="p-phase-name">—</div>
        <div class="step-name" id="p-step-name">Väntar på Game Master...</div>
        <div style="margin-top:6px;font-size:13px;color:#888">Kvarter: <span id="p-block-name" style="color:#f0c929;cursor:pointer;border-bottom:1px dashed #666" title="Klicka för att byta namn">—</span>
            <span id="btn-leave-player" style="margin-left:12px;color:#c0392b;cursor:pointer;font-size:12px">Lämna</span>
        </div>
    </div>
    <div class="assets-grid" id="player-assets"></div>
</div>

<!-- GM VIEW -->
<div id="view-gm" class="view gm-view">
    <div class="gm-header">
        <div>
            <div style="color:#555;font-size:10px">GM-session: <span id="gm-room-code" style="letter-spacing:2px">—</span>
                <span id="btn-gm-reset" style="cursor:pointer;color:#e74c3c;margin-left:16px;font-size:11px;text-decoration:underline">Nollställ</span>
                <span id="btn-gm-save-setup" style="cursor:pointer;color:#27ae60;margin-left:16px;font-size:11px;text-decoration:underline">💾 Spara setup</span>
            </div>
        </div>
        <div class="gm-controls">
            <button class="btn-prev" id="btn-prev-step">◀ Föregående</button>
            <button class="btn-next" id="btn-next-step">Nästa steg ▶</button>
            <button id="btn-gm-finish" style="background:#27ae60;color:white;border:none;padding:6px 14px;border-radius:6px;cursor:pointer;font-size:12px;margin-left:8px">✓ Avsluta spel</button>
        </div>
    </div>
    <div class="gm-phase-bar">
        <div class="phase" id="gm-phase-name">—</div>
        <div class="step" id="gm-step-name">—</div>
        <div style="margin-top:6px">
            <a id="gm-dashboard-link" href="#" target="_blank" style="color:#4db8ff;font-size:13px">Öppna extern dashboard</a>
            <span style="margin:0 8px;color:#334">|</span>
            <a href="/companion/analytics" target="_blank" style="color:#4db8ff;font-size:13px">Analytics</a>
        </div>
        <div id="gm-omvarld-panel" style="display:none"></div>
    </div>

    <!-- Tab switcher -->
    <div style="display:flex;gap:8px;margin-bottom:12px">
        <button class="btn-secondary gm-tab" data-tab="table" style="flex:1;padding:8px">Spelaröversikt</button>
        <button class="btn-secondary gm-tab active" data-tab="quarters" style="flex:1;padding:8px">Stadsdelar</button>
        <button class="btn-secondary gm-tab" data-tab="quiz" style="flex:1;padding:8px">Quiz</button>
    </div>

    <!-- Table view -->
    <div id="gm-table-view" class="gm-tab-content" style="display:none">
        <div style="overflow-x:auto"><table id="gm-player-table" class="gm-table"></table></div>
    </div>

    <!-- Quarters view -->
    <div id="gm-quarters-view" class="gm-tab-content">
        <div class="quarters-grid" id="gm-quarters"></div>
    </div>

    <!-- Quiz view -->
    <div id="gm-quiz-view" class="gm-tab-content" style="display:none">
        <div id="gm-quiz-content"></div>
    </div>
</div>

<!-- MODAL CONTAINER -->
<div id="modal-container"></div>
<!-- QUIZ MODAL CONTAINER (separate to avoid clobbering game modals) -->
<div id="quiz-modal-container"></div>

<script type="module">
// ── Tier & Ranking helpers ──
var TIERS = [
    { min: 80, label: 'Dominant', color: '#9b59b6', emoji: '\uD83D\uDFE3' },
    { min: 60, label: 'Stark position', color: '#27ae60', emoji: '\uD83D\uDFE2' },
    { min: 30, label: 'Medel', color: '#f0c929', emoji: '\uD83D\uDFE1' },
    { min: -999, label: 'Riskfylld', color: '#e74c3c', emoji: '\uD83D\uDD34' },
];
function getTier(score) {
    return TIERS.find(function(t) { return score >= t.min; }) || TIERS[TIERS.length - 1];
}
function rankBadge(rank, total) {
    var medals = {1: '\uD83E\uDD47', 2: '\uD83E\uDD48', 3: '\uD83E\uDD49'};
    var medal = medals[rank] || '';
    return medal + ' #' + rank + ' av ' + total;
}
function tierBadge(score) {
    var t = getTier(score);
    return '<span style="color:' + t.color + '">' + t.emoji + ' ' + t.label + '</span>';
}
function rankColor(rank) {
    if (rank === 1) return '#f0c929';
    if (rank === 2) return '#bdc3c7';
    if (rank === 3) return '#cd7f32';
    return '#888';
}

// ── State ──
const S = {
    ws: null,
    playerId: null,
    roomCode: null,
    isGM: false,
    state: null,
    pcData: [],
    acData: [],
    projectData: {},
    planningData: null,
    lastLeaderboard: null,
    _leaderboardTimer: null,
    ddData: [],
    omvarldData: [],
    quizQuestions: [],
    _quizTimer: null,
    _quizAnswered: false,
};

function showView(id) {
    document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
    document.getElementById(id).classList.add('active');
}

// Persist session across refresh
function saveSession() {
    sessionStorage.setItem('pmopoly_companion', JSON.stringify({
        playerId: S.playerId, roomCode: S.roomCode, isGM: S.isGM
    }));
}
function restoreSession() {
    const saved = sessionStorage.getItem('pmopoly_companion');
    if (!saved) return false;
    const data = JSON.parse(saved);
    if (!data.playerId || !data.roomCode) return false;
    S.playerId = data.playerId;
    S.roomCode = data.roomCode;
    S.isGM = data.isGM;
    return true;
}

function clearSession() {
    sessionStorage.removeItem('pmopoly_companion');
    S.playerId = null;
    S.roomCode = null;
    S.isGM = false;
    S.state = null;
}

async function tryReconnect() {
    // Verify room still exists on server
    const res = await fetch('/api/companion/rooms/' + S.roomCode);
    if (!res.ok) {
        clearSession();
        return false;
    }
    return true;
}

// Show GM lobby if URL is /companion/gm
if (location.pathname.endsWith('/gm')) {
    if (restoreSession() && S.isGM) {
        tryReconnect().then(ok => {
            if (ok) { loadReferenceData().then(() => { connectWs(S.roomCode, S.playerId); showView('view-gm'); }); }
            else showView('view-gm-lobby');
        });
    } else {
        showView('view-gm-lobby');
    }
} else {
    if (restoreSession() && !S.isGM) {
        tryReconnect().then(ok => {
            if (ok) { loadReferenceData().then(() => { connectWs(S.roomCode, S.playerId); showView('view-player'); }); }
            else showView('view-lobby');
        });
    } else {
        showView('view-lobby');
    }
}

// ── WebSocket ──
var _wsRetries = 0;
var _wsSendQueue = []; // Buffer for messages sent while WS is not OPEN
function connectWs(code, playerId) {
    // Close any existing connection
    if (S.ws) {
        S.ws.onclose = null;
        S.ws.onerror = null;
        if (S.ws.readyState <= 1) S.ws.close();
    }
    const proto = location.protocol === 'https:' ? 'wss:' : 'ws:';
    const url = `${proto}//${location.host}/companion/ws/${code}/${playerId}`;
    const ws = new WebSocket(url);
    ws.onopen = () => {
        console.log('WS connected');
        _wsRetries = 0;
        // Flush any messages queued while WS was down
        var queued = _wsSendQueue.splice(0);
        queued.forEach(function(msg) {
            try { ws.send(JSON.stringify(msg)); } catch(e) {}
        });
    };
    ws.onmessage = (e) => {
        const data = JSON.parse(e.data);
        if (data.type === 'state') {
            var plc = data.state && data.state.player ? data.state.player.pl_choices : (data.state ? '(GM state)' : null);
            console.log('WS STATE rx, pl_choices:', JSON.stringify(plc), 'queue:', _wsSendQueue.length);
            // Only update state if we have no pending (unacknowledged) sends
            if (_wsSendQueue.length === 0) {
                S.state = data.state;
                render();
                // Player: check for unanswered active quiz on reconnect
                if (!S.isGM && data.state.quiz_active_question && !S._quizAnswered) {
                    showQuizModal(data.state.quiz_active_question);
                }
            } else {
                console.warn('WS STATE skipped (queue not empty)');
            }
        } else if (data.type === 'quiz_question') {
            S._quizAnswered = false;
            showQuizModal(data.question);
        } else if (data.type === 'quiz_feedback') {
            showQuizFeedback(data);
        } else if (data.type === 'quiz_closed') {
            showQuizClosed(data);
        }
    };
    ws.onclose = (e) => {
        // Don't reconnect on auth errors or too many retries
        if (e.code >= 4000 || _wsRetries >= 5) {
            console.warn('WS closed permanently:', e.code, e.reason);
            return;
        }
        _wsRetries++;
        setTimeout(() => connectWs(code, playerId), 3000);
    };
    ws.onerror = () => {}; // Suppress error logging (onclose handles it)
    S.ws = ws;
}

function send(data) {
    if (S.ws && S.ws.readyState === WebSocket.OPEN) {
        S.ws.send(JSON.stringify(data));
    } else {
        // Queue message to send when WS reconnects
        _wsSendQueue.push(data);
        console.warn('WS not open, message queued (queue length:', _wsSendQueue.length, ')');
    }
}

// ── Step Done / Klar logic ──
function isStepAutoDone(p, stepId) {
    if (stepId === 'choose_pc') return p.projektchef != null;
    if (stepId === 'choose_ac') return p.arbetschef != null;
    if (stepId === 'projects') return (p.projects || []).length > 0;
    if (stepId === 'planning') return Object.keys(p.pl_choices || {}).length >= 13;
    if (stepId === 'gf_abt_ek') return (p.eget_kapital || 0) !== 0;
    if (stepId === 'f4_forbered') return (p.fastigheter || []).length > 0;
    return false;
}

function isStepDone(p, stepId) {
    if (isStepAutoDone(p, stepId)) return true;
    return (p.steps_done || {})[stepId] === true;
}

// ── Projected Score ──
function projectedScore(p, phase) {
    if (!p || !p.projects || p.projects.length === 0) return 0;

    var projects = p.projects;
    var totalAnsk = projects.reduce(function(s, pr) { return s + (pr.anskaffning || 0); }, 0);
    var totalBta = projects.reduce(function(s, pr) { return s + (pr.bta || 0); }, 0);
    var projKost = (p.dev_cost_total || projects.reduce(function(s, pr) { return s + (pr.kostnad || 0); }, 0));
    var markKost = 15 + (p.mark_expansions || 0) * 5;
    var totalKost = projKost + markKost;
    var totalQ = p.q_krav || 0;
    var totalH = p.h_krav || 0;

    // Planning totals
    var choices = p.pl_choices || {};
    var plEvts = p.pl_events || {};
    var plCost = 0, plEvAbt = 0, plErf = 0;
    var curQ = 0, curH = 0, curT = 0;
    for (var k in choices) { var ch = choices[k]; plCost += ch.cost||0; curQ += ch.q||0; curH += ch.h||0; curT += ch.t||0; plErf += ch.erf||0; }
    for (var k2 in plEvts) { var ev = plEvts[k2]; plEvAbt += ev.abt||0; }

    // Byggfas totals
    var gfP = p.gf_phases || {};
    var gfAbt = 0;
    for (var f in gfP) { gfAbt += gfP[f].abt||0; }
    var konsAbt = (p.gf_kons_q||0) + (p.gf_kons_h||0) + (p.gf_kons_t||0) + (p.gf_garanti_abt||0);

    // BRF values (used in multiple phases)
    var brfProj = projects.filter(function(pr) { return pr.typ === 'BRF'; });
    var brfValue = brfProj.reduce(function(s, pr) { return s + ((pr.marknadsvarde||pr.anskaffning) - pr.anskaffning); }, 0);

    // Estimated FV from driftnetto (non-BRF only)
    var estFV = projects.reduce(function(s, pr) {
        var dn = pr.driftnetto || 0;
        var isBost = (pr.typ === 'Hyresrätt' || pr.typ === 'BRF');
        var yld = isBost ? 4.0 : 5.0;
        return s + (dn > 0 ? (4 * dn) / (yld / 100) : (pr.marknadsvarde || pr.anskaffning || 0));
    }, 0);
    var nonBrfFV = estFV - brfProj.reduce(function(s, pr) { return s + (pr.marknadsvarde || pr.anskaffning || 0); }, 0);
    var rorlig = p.gf_brf_rorlig || 0;

    // Safeguard
    if (totalBta <= 0) return 0;

    // ── Phase 1: Projektutveckling ──
    if (phase === 'phase1') {
        var _margin = totalAnsk / Math.max(totalKost, 1);
        var _avgForm = projects.reduce(function(s, pr) { return s + (pr.formfaktor || 3); }, 0) / Math.max(projects.length, 1);
        var _uniqueTypes = 0;
        var _seenTypes = {};
        projects.forEach(function(pr) { if (pr.typ && !_seenTypes[pr.typ]) { _seenTypes[pr.typ] = true; _uniqueTypes++; } });
        var _qhBurden = totalQ + totalH;
        var _rb = p.riskbuffertar || 0;

        // Estimate TB: optimistic but reasonable
        var _estTB = totalAnsk * 0.20 - totalKost;
        // Estimate FV from driftnetto and default yields (already computed as nonBrfFV)
        // BRF projects sell: value goes to EK not FV
        var _estEK = brfValue + _estTB;

        var _baseScore = (0.30 * nonBrfFV + 0.10 * Math.max(0, _estEK)) / totalBta * 1000 + Math.max(0, _estTB);

        // Adjustments
        var _formPenalty = _avgForm > 4 ? -(_avgForm - 4) * 3 : (4 - _avgForm) * 1;
        var _diversityBonus = _uniqueTypes >= 3 ? 3 : _uniqueTypes === 1 ? -3 : 0;
        var _qhPenalty = -_qhBurden * 0.3;
        var _rbBonus = _rb * 2;

        var projected = _baseScore + _formPenalty + _diversityBonus + _qhPenalty + _rbBonus;
        return isFinite(projected) ? Math.round(projected * 10) / 10 : 0;
    }

    // ── Phase 2: Planering ──
    if (phase === 'phase2') {
        var _numChoices = Object.keys(choices).length;
        var _avgNiva = _numChoices > 0 ? Object.values(choices).reduce(function(s, c) { return s + (c.niva || 1); }, 0) / _numChoices : 2;

        // Q/H/T gaps
        var _qGap = Math.max(0, totalQ - curQ);
        var _hGap = Math.max(0, totalH - curH);
        var _tGap = Math.max(0, curT - 12);

        // Estimated konsekvenskort cost
        var _estKonsKort = _qGap + _hGap + _tGap;
        var _estKonsCost = _estKonsKort * 4;

        // Garanti from low-level suppliers
        var _lowLevelCount = Object.values(choices).filter(function(c) { return (c.niva || 1) < 3; }).length;
        var _estGarantiCost = (_estKonsKort + _lowLevelCount) * 2;

        // Projected ABT usage
        var _abtUsed = plCost + plEvAbt;
        var _estTotalAbtUsed = _abtUsed + (13 - _numChoices) * (_abtUsed / Math.max(_numChoices, 1)) + _estKonsCost + _estGarantiCost;
        var _estTB2 = totalAnsk - totalKost - _estTotalAbtUsed;

        // Projected EK
        var _estEK2 = brfValue + _estTB2 + rorlig;
        var _ekFactor2 = _estEK2 >= 0 ? 0.10 : 2.00;

        var projected = totalBta > 0 ? (0.30 * nonBrfFV + _ekFactor2 * _estEK2) / totalBta * 1000 + Math.max(0, _estTB2) : 0;
        // Adjustments
        projected += (_avgNiva - 2) * 3;
        projected += plErf * 0.5;
        return isFinite(projected) ? Math.round(projected * 10) / 10 : 0;
    }

    // ── Phase 3: Genomförande ──
    if (phase === 'phase3') {
        // Real Q/H/T gaps
        var _konsQ = Math.max(0, totalQ - curQ);
        var _konsH = Math.max(0, totalH - curH);
        var _konsT = Math.max(0, curT - 12);

        // Real costs
        var _realAbtUsed = plCost + plEvAbt + gfAbt + konsAbt;
        var _realTB = totalAnsk - totalKost - _realAbtUsed;

        // EK estimation
        var _realEK = brfValue + _realTB + rorlig;
        var _modLanSkuld = (p.gf_moderbolagslan_antal || 0) * 100;
        var _modLanTillskott = (p.gf_moderbolagslan_antal || 0) * 95;
        _realEK += _modLanTillskott - _modLanSkuld;

        var _ekFactor3 = _realEK >= 0 ? 0.10 : 2.00;
        var projected = totalBta > 0 ? (0.30 * nonBrfFV + _ekFactor3 * _realEK) / totalBta * 1000 + Math.max(0, _realTB) : 0;
        return isFinite(projected) ? Math.round(projected * 10) / 10 : 0;
    }

    // ── Phase 4: Förvaltning ──
    if (phase === 'phase4') {
        var _ownedFasts = (p.fastigheter || []).filter(function(ff) { return !ff.sold; });
        if (_ownedFasts.length === 0) {
            // Fallback to projects if no fastigheter yet
            _ownedFasts = projects.map(function(pr) { return pr; });
        }
        var _actualFV = _ownedFasts.reduce(function(s, ff) {
            var isBost = ff.typ === 'Hyresrätt';
            var yld = isBost ? (p.f4_yield_bostader || 4.0) : (p.f4_yield_kommersiellt || 5.0);
            var dn = ff.driftnetto || 0;
            var eklMap = {'A':1.10,'B':1.05,'C':1.00,'D':0.95,'E':0.90,'F':0.85};
            var eklF = eklMap[(ff.energiklass || 'C').toUpperCase()] || 1.0;
            return s + (yld > 0 ? (4 * dn) / (yld / 100) * eklF : 0);
        }, 0);
        var _ownedBTA = _ownedFasts.reduce(function(s, ff) { return s + (ff.bta || 0); }, 0);
        var _actualEK = p.eget_kapital || 0;

        // Energy upgrade potential
        var _energyPotential = _ownedFasts.reduce(function(s, ff) {
            var eklIdx = 'FEDCBA'.indexOf((ff.energiklass || 'D').toUpperCase());
            var stepsToA = Math.max(0, 5 - eklIdx);
            return s + stepsToA * 0.02 * (ff.marknadsvarde || 0);
        }, 0);

        // TB from earlier phases
        var _realAbtUsed4 = plCost + plEvAbt + gfAbt + konsAbt;
        var _realTB4 = totalAnsk - totalKost - _realAbtUsed4;

        var _ekFactor4 = _actualEK >= 0 ? 0.10 : 2.00;
        var projected = _ownedBTA > 0 ? (0.30 * _actualFV + _ekFactor4 * _actualEK) / _ownedBTA * 1000 + _realTB4 : 0;
        projected += _energyPotential * 0.01;
        // At f4_slut, use the exact final score if available
        if (p.f4_final_score && p.f4_final_score !== 0) return p.f4_final_score;
        return isFinite(projected) ? Math.round(projected * 10) / 10 : 0;
    }

    return 0;
}

function renderTrendScore(score, prevScore) {
    var arrow = '';
    var trendClass = 'trend-flat';
    if (prevScore && score > prevScore + 0.5) { arrow = '\u25B2'; trendClass = 'trend-up'; }
    else if (prevScore && score < prevScore - 0.5) { arrow = '\u25BC'; trendClass = 'trend-down'; }
    return '<span class="projected-score"><span>' + score + '</span>' +
        (arrow ? '<span class="' + trendClass + '">' + arrow + '</span>' : '') + '</span>';
}

async function loadReferenceData() {

        fetch('/api/companion/data/pc'),

// ── Player Rendering ──
function renderPlayer() {
    const st = S.state;
    if (!st) return;
    const p = st.player;
    if (!p) return;
    document.getElementById('p-phase-name').textContent = st.phase_name || '—';

    // Step name + info icon
    const stepEl = document.getElementById('p-step-name');
    stepEl.innerHTML = (st.step_name || 'Väntar...') +
        (st.step_help ? ' <span class="help-icon" id="btn-help-step" title="Visa hjälp">ℹ️</span>' : '');

    // Show help popup on step change
    if (st.step && st.step !== S._lastStep && st.step_help) {
        S._lastStep = st.step;
        showHelpPopup(st.step_name, st.step_help);
    }
    if (!S._lastStep) S._lastStep = st.step;
    const blockEl = document.getElementById('p-block-name');
    blockEl.textContent = p.block_name || '—';
    blockEl.onclick = () => {
        const newName = prompt('Nytt kvartersnamn:', p.block_name);
        if (newName && newName.trim()) send({ type: 'rename_block', name: newName.trim() });
    };

    const container = document.getElementById('player-assets');
    const step = st.step || '';
    const isFinished = (step === 'f4_slut');
    _playerLocked = isFinished;

    // Determine visibility and editability per step
    const phase = st.phase || '';
    const isPhase1 = phase === 'phase1';
    const isPhase2 = phase === 'phase2';
    const isPhase3 = phase === 'phase3';
    const isPhase4 = phase === 'phase4';

    const PH1_STEPS = ['choose_pc', 'projects', 'namndbeslut', 'rb_invest'];
    const PH2_STEPS = ['choose_ac', 'planning', 'planning_summary'];
    const PH3_STEPS = ['gf_byggfaser', 'gf_konsekvens', 'gf_garanti', 'gf_abt_ek'];
    const ph1Idx = PH1_STEPS.indexOf(step);
    const ph2Idx = PH2_STEPS.indexOf(step);
    const ph3Idx = PH3_STEPS.indexOf(step);

    // Phase 1 visibility
    const showPC = ph1Idx >= 0 || isPhase2 || isPhase3 || isPhase4;
    const editPC = step === 'choose_pc';
    const showProjects = ph1Idx >= 1 || isPhase2 || isPhase3 || isPhase4;
    const editProjects = step === 'projects';
    const editProjectsRemove = step === 'namndbeslut';
    const showCounters = (ph1Idx >= 1 && step !== 'rb_invest') || false;
    const showRbInvest = step === 'rb_invest';

    // Phase 2 visibility
    const showAC = ph2Idx >= 0 || isPhase3 || isPhase4;
    const editAC = step === 'choose_ac';
    const showPlanning = ph2Idx >= 1 || isPhase3 || isPhase4;
    const editPlanning = step === 'planning';

    // Phase 3 visibility
    const showGF = ph3Idx >= 0;

    let html = '';

    // PC Card
    if (showPC) {
        var pcCollapsed = isPhase2 || isPhase3 || isPhase4;
        html += '<div class="asset-card pc">';

    if (showRbInvest) {

    // AC Card (Phase 2)
    if (showAC) {

    // Planning steps (Phase 2) — collapsed in Phase 3
    if (showPlanning && S.planningData) {

    if (step === 'gf_konsekvens') {

        for (var _k in _choices) { var _ch = _choices[_k]; _plQ += _ch.q||0; _plH += _ch.h||0; _plT += _ch.t||0; }
        for (var _k in _plEvts) { var _ev = _plEvts[_k]; _plQ += _ev.q||0; _plH += _ev.h||0; }
        var _gfP = p.gf_phases || {};
        var _gfQ = 0, _gfH = 0, _gfT = 0;

        var _projQ = p.projects.reduce(function(s, pr) { return s + (pr.kvalitet || 0); }, 0);

    // Phase 3: Garantibesiktning
    if (step === 'gf_garanti') {
        // Garanti cards = konsekvenskort drawn + suppliers below level 3
        var _chc = p.pl_choices || {};
        var _plEv2 = p.pl_events || {};
        var _plQ2 = 0, _plH2 = 0, _plT2 = 0;
        for (var _k2 in _chc) { var _c2 = _chc[_k2]; _plQ2 += _c2.q||0; _plH2 += _c2.h||0; _plT2 += _c2.t||0; }
        for (var _k2 in _plEv2) { var _e2 = _plEv2[_k2]; _plQ2 += _e2.q||0; _plH2 += _e2.h||0; }
        var _gfP2 = p.gf_phases || {};
        var _gfQ2 = 0, _gfH2 = 0, _gfT2 = 0;
        for (var _f2 in _gfP2) { _gfQ2 += _gfP2[_f2].q||0; _gfH2 += _gfP2[_f2].h||0; _gfT2 += _gfP2[_f2].t||0; }
        var _pQ2 = p.projects.reduce(function(s,pr){return s+(pr.kvalitet||0);},0);

        // Suppliers below level 3
        var lowLevSupp = 0;

    // Phase 3: ABT→EK (rörlig intäkt BRF + moderbolagslån)
    if (step === 'gf_abt_ek') {
        // BRF: fast intäkt = MV - anskaffning
        var brfProj = p.projects.filter(function(pr) { return pr.typ === 'BRF'; });
        var brfFast = brfProj.reduce(function(s, pr) { return s + ((pr.marknadsvarde||pr.anskaffning) - pr.anskaffning); }, 0);

        // TB = anskaffning kvar (already calculated as anskKvar above in summary)
        // Recalculate here for use
        var _projAnsk = p.projects.reduce(function(s,pr){return s+(pr.anskaffning||0);},0);
        var _projKost = p.projects.reduce(function(s,pr){return s+(pr.kostnad||0);},0) + 15 + (p.mark_expansions||0)*5;
        var _chc3 = p.pl_choices||{}, _plEv3 = p.pl_events||{}, _gfP3 = p.gf_phases||{};
        var _abtUsed = 0;
        for (var _k3 in _chc3) _abtUsed += _chc3[_k3].cost||0;
        for (var _k3 in _plEv3) _abtUsed += _plEv3[_k3].abt||0;
        for (var _f3 in _gfP3) _abtUsed += _gfP3[_f3].abt||0;
        _abtUsed += (p.gf_kons_q||0) + (p.gf_kons_h||0) + (p.gf_kons_t||0) + (p.gf_garanti_abt||0);
        var tb = _projAnsk - _projKost - _abtUsed;

        var rorlig = p.gf_brf_rorlig || 0;
        var modLanAntal = p.gf_moderbolagslan_antal || 0;

        var modLanTillskott = modLanAntal * 95;

        // EK = BRF fast + TB + rörlig + moderbolagslån tillskott - moderbolagslån skuld
        var calcEK = brfFast + tb + rorlig + modLanTillskott - modLanSkuld;

        var nonBrfProj = p.projects.filter(function(pr) { return pr.typ !== 'BRF'; });
        var kassaBeforeLoan = brfFast + tb + rorlig;

        html += '<div class="asset-card" style="border-left-color:#f0c929">';
        html += '<div class="asset-label" style="color:#f0c929">\uD83D\uDD11 \u00d6VERL\u00c4MNING TILL F\u00d6RVALTNING</div>';
        html += '<div style="font-size:14px;line-height:1.8">';

        // Step 1: TB

            html += '<span>Personalkostnad (FC + FS)</span><span style="color:#e74c3c;font-weight:600">\u2212' + _totalLonQ + ' Mkr</span></div>';
            // Net result
            html += '<div style="display:flex;justify-content:space-between;align-items:center;border-top:1px solid #334;margin-top:6px;padding-top:6px">';
            html += '<span style="font-size:15px;font-weight:700;color:' + (_nettoKvartal >= 0 ? '#27ae60' : '#e74c3c') + '">Netto: ' + (_nettoKvartal >= 0 ? '+' : '') + _nettoKvartal + ' Mkr/kv</span>';
            if (_dnAdded) {
                html += '<span style="color:#27ae60;font-size:13px">\u2713 Tillagd i Kassa</span>';
            } else {
                html += '<span style="color:#f0c929;font-size:12px" id="dn-auto-pending">L\u00e4ggs till automatiskt...</span>';
            }
            html += '</div>';
            html += '</div>';
            // Auto-add DN + personal cost to Kassa if not already done
            if (!_dnAdded) {
                setTimeout(function() {
                    send({ type: 'update_assets', assets: { eget_kapital: (S.state.player.eget_kapital || 0) + _nettoKvartal } });
                    send({ type: 'mark_done', step: 'dn_' + S.state.step });
                }, 500);
            }
        }

        // Kvartalshändelser (specific per quarter) — only if player owns the relevant type
        var _kvartalsEvents = {
            'f4_q1': { text: 'F\u00f6rskolor: H\u00e4ndelsekort', color: '#27ae60', icon: '\uD83C\uDFEB', typ: 'F\u00d6RSKOLOR' },
            'f4_q2': { text: 'Hyresr\u00e4tt: Hyresf\u00f6rhandling', color: '#f0c929', icon: '\uD83D\uDCCB', typ: 'Hyresr\u00e4tt' },
            'f4_q3': { text: 'Lokal: H\u00e4ndelsekort', color: '#2980b9', icon: '\uD83C\uDFEC', typ: 'LOKAL' },
            'f4_q4': { text: 'Kontor: H\u00e4ndelsekort', color: '#8e44ad', icon: '\uD83C\uDFE2', typ: 'KONTOR' },
        };
        if (_kvartalsEvents[step] && _driftnettoQuarters.indexOf(step) >= 0) {
            var _kev = _kvartalsEvents[step];
            var _ownsType = _unsoldFasts.some(function(f) { return f.typ === _kev.typ; });
            var _hEk = ((_f4Q || {})[step] || {}).handelse_ek || 0;
            html += '<div class="asset-card" style="border-left-color:' + _kev.color + '">';
            html += '<div class="asset-label">\uD83C\uDFB2 KVARTALSH\u00c4NDELSE</div>';
            html += '<div style="font-size:14px;color:' + _kev.color + ';margin-bottom:8px">' + _kev.icon + ' ' + _kev.text + '</div>';
            if (_ownsType) {
                html += '<div style="display:flex;align-items:center;gap:10px;font-size:14px">';
                html += '<span>Kassa-effekt:</span>';
                html += '<span class="f4-q-adj-btn" data-step="' + step + '" data-field="handelse_ek" data-d="-1" style="cursor:pointer;color:#e74c3c;font-size:18px;padding:0 4px">\u2212</span>';
                html += '<strong style="color:' + (_hEk >= 0 ? '#27ae60' : '#e74c3c') + '">' + _hEk + ' Mkr</strong>';
                html += '<span class="f4-q-adj-btn" data-step="' + step + '" data-field="handelse_ek" data-d="1" style="cursor:pointer;color:#27ae60;font-size:18px;padding:0 4px">+</span>';
                html += '</div>';
            } else {
                html += '<div style="font-size:13px;color:#555;font-style:italic">Du f\u00f6rvaltar inga ' + _kev.typ.toLowerCase() + ' \u2014 detta kvartal p\u00e5verkas du inte.</div>';
            }
            html += '</div>';
        }

        // Omvärldskort — manual Kassa/energi adjustment per quarter
        if (_driftnettoQuarters.indexOf(step) >= 0) {
            var _f4Q = p.f4_quarters || {};
            var _qData = _f4Q[step] || {};
            var _omEk = _qData.omvarld_ek || 0;
            html += '<div class="asset-card" style="border-left-color:#8e44ad">';
            html += '<div class="asset-label">\uD83C\uDF0D OMV\u00c4RLDSKORT</div>';
            html += '<div style="font-size:13px;color:#aaa;margin-bottom:8px">Justera Kassa och energiklass enligt det dragna kortet. Energiklass \u00e4ndras per fastighet ovan.</div>';
            html += '<div style="display:flex;align-items:center;gap:10px;font-size:14px">';
            html += '<span>Kassa-effekt:</span>';
            html += '<span class="f4-q-adj-btn" data-step="' + step + '" data-field="omvarld_ek" data-d="-1" style="cursor:pointer;color:#e74c3c;font-size:18px;padding:0 4px">\u2212</span>';
            html += '<strong style="color:' + (_omEk >= 0 ? '#27ae60' : '#e74c3c') + '">' + _omEk + ' Mkr</strong>';
            html += '<span class="f4-q-adj-btn" data-step="' + step + '" data-field="omvarld_ek" data-d="1" style="cursor:pointer;color:#27ae60;font-size:18px;padding:0 4px">+</span>';
            html += '</div></div>';
        }

        // Yield input (visible in phase 4, but +/- buttons hidden in Q4)
        var _yieldReadOnly = (step === 'f4_q4');
        if (true) {
            html += '<div class="asset-card" style="border-left-color:#3498db">';
            html += '<div class="asset-label">YIELD</div>';
            html += '<div style="font-size:14px">';
            html += '<div style="display:flex;justify-content:space-between;align-items:center;padding:4px 0">';
            html += '<span>Yield Bost\u00e4der</span>';
            if (_yieldReadOnly) {
                html += '<span><strong>' + p.f4_yield_bostader.toFixed(1) + '%</strong></span>';
            } else {
                html += '<span><span class="f4-yield-btn" data-type="bostader" data-d="-0.5">\u2212</span> <strong>' + p.f4_yield_bostader.toFixed(1) + '%</strong> <span class="f4-yield-btn" data-type="bostader" data-d="0.5">+</span></span>';
            }
            html += '</div>';
            html += '<div style="display:flex;justify-content:space-between;align-items:center;padding:4px 0">';
            html += '<span>Yield Kommersiellt</span>';
            if (_yieldReadOnly) {
                html += '<span><strong>' + p.f4_yield_kommersiellt.toFixed(1) + '%</strong></span>';
            } else {
                html += '<span><span class="f4-yield-btn" data-type="kommersiellt" data-d="-0.5">\u2212</span> <strong>' + p.f4_yield_kommersiellt.toFixed(1) + '%</strong> <span class="f4-yield-btn" data-type="kommersiellt" data-d="0.5">+</span></span>';
            }
            html += '</div>';
            if (_yieldReadOnly) {
                html += '<div style="font-size:12px;color:#888;margin-top:4px">Yield kan inte \u00e4ndras i Q4.</div>';
            }
            html += '</div></div>';
        }

        // Kassa summary at bottom of quarter
        if (_isQuarter) {
            html += '<div style="background:#0f1923;border:2px solid ' + ((p.eget_kapital||0) >= 0 ? '#27ae60' : '#e74c3c') + ';border-radius:10px;padding:12px;margin:10px 0;text-align:center">';
            html += '<div style="font-size:13px;color:#aaa">Kassa efter kvartal ' + _qNum + '</div>';
            html += '<div style="font-size:22px;font-weight:900;color:' + ((p.eget_kapital||0) >= 0 ? '#27ae60' : '#e74c3c') + '">' + Math.round(p.eget_kapital||0) + ' Mkr</div>';
            html += '</div>';
        }

        if (isFinished) html += '</div>'; // close lock wrapper

        // Slutvärdering
        if (step === 'f4_slut') {
            var _ownedF = fasts.filter(function(f){return !f.sold;});
            var _fv = _ownedF.reduce(function(s,f){return s+(f.marknadsvarde||f.anskaffning||0);},0);
            var _btaOwned = _ownedF.reduce(function(s,f){return s+(f.bta||0);},0);
            var _ek4 = p.eget_kapital || 0;
            // TG from summary
            var _pAnsk4 = p.projects.reduce(function(s,pr){return s+(pr.anskaffning||0);},0);
            var _pKost4 = p.projects.reduce(function(s,pr){return s+(pr.kostnad||0);},0) + 15 + (p.mark_expansions||0)*5;
            var _abt4 = 0;
            var _ch4 = p.pl_choices||{}; for(var k in _ch4) _abt4 += _ch4[k].cost||0;
            var _ev4 = p.pl_events||{}; for(var k in _ev4) _abt4 += _ev4[k].abt||0;
            var _gf4 = p.gf_phases||{}; for(var k in _gf4) _abt4 += _gf4[k].abt||0;
            _abt4 += (p.gf_kons_q||0)+(p.gf_kons_h||0)+(p.gf_kons_t||0)+(p.gf_garanti_abt||0);
            var _tb4 = _pAnsk4 - _pKost4 - _abt4;
            // EK: positive = 10%, negative = 200% penalty
            var _ekFactor = _ek4 >= 0 ? 0.10 : 2.00;
            var _score = _btaOwned > 0 ? (0.30*_fv + _ekFactor*_ek4)/_btaOwned*1000 + _tb4 : _tb4;

            html += '<div class="asset-card" style="border-left-color:#f0c929;background:#1a2736">';
            html += '<div class="asset-label" style="color:#f0c929;font-size:18px">\ud83c\udfc6 SLUTV\u00c4RDERING</div>';
            html += '<div style="font-size:14px;line-height:2">';
            html += '<div>Fastighetsv\u00e4rde (FV): <strong>' + Math.round(_fv) + ' Mkr</strong></div>';
            html += '<div>30% av FV: <strong>' + Math.round(0.3*_fv) + ' Mkr</strong></div>';
            html += '<div>Kassa: <strong>' + Math.round(_ek4) + ' Mkr</strong></div>';
            html += '<div>' + (_ek4 >= 0 ? '10%' : '<span style="color:#e74c3c">200%</span>') + ' av Kassa: <strong style="color:' + (_ek4 >= 0 ? 'inherit' : '#e74c3c') + '">' + Math.round(_ekFactor*_ek4) + ' Mkr</strong></div>';
            html += '<div>\u00c4gd BTA: <strong>' + _btaOwned + ' kvm</strong></div>';
            html += '<div>TB: <strong>' + Math.round(_tb4) + ' Mkr</strong></div>';
            html += '<div style="border-top:2px solid #f0c929;padding-top:8px;margin-top:8px;font-size:20px">';
            html += '<strong style="color:#f0c929">Slutpo\u00e4ng: ' + Math.round(_score*10)/10 + '</strong></div>';
            html += '</div>';

            // Fetch ranking
            html += '<div id="player-ranking" style="margin-top:12px;color:#999;font-size:13px">H\u00e4mtar ranking...</div>';
            html += '</div>';

            // Auto-save score
            if (Math.round((p.f4_final_score||0)*10) !== Math.round(_score*10)) {
                send({ type: 'update_assets', assets: { f4_final_score: Math.round(_score*10)/10 } });
            }
        }
    } catch(e) { console.error('[F4 render error]', e); html += '<div style="color:red">Fas 4 renderingsfel: ' + e.message + '</div>'; }
    }

    // ── "Klar med detta steg" button ──
    if (step) {
        var _isDone = isStepDone(p, step);
        var _isAutoDone = isStepAutoDone(p, step);
        html += '<div class="klar-section">';
        if (_isDone) {
            html += '<div class="klar-btn is-done">\u2713 Markerad som klar';
            if (!_isAutoDone) {
                html += '<span class="klar-undo" data-action="unmark-done" data-step="' + step + '">\u00c5ngra</span>';
            }
            html += '</div>';
        } else {
            // Check if step requires specific action before marking done
            var _canMark = true;
            var _blockMsg = '';
            if (step === 'choose_pc' && !p.projektchef) { _canMark = false; _blockMsg = 'Välj en Projektchef först'; }
            if (step === 'choose_ac' && !p.arbetschef) { _canMark = false; _blockMsg = 'Välj en Arbetschef först'; }
            if (step === 'projects' && (p.projects||[]).length === 0) { _canMark = false; _blockMsg = 'Lägg till minst ett projekt'; }
            if (_canMark) {
                html += '<button class="klar-btn not-done" data-action="mark-done" data-step="' + step + '">\u2713 Klar med detta steg</button>';
            } else {
                html += '<div class="klar-btn blocked" style="opacity:0.4;cursor:not-allowed;text-align:center;padding:12px;color:#e74c3c">' + _blockMsg + '</div>';
            }
        }
        html += '</div>';
    }

    // ── Projected score indicator in summary ──
    var _projScore = projectedScore(p, phase);
    var _prevScore = p.prev_profit_score || 0;

    // Info summary (always visible from step 1+)
    if (ph1Idx >= 0 || ph2Idx >= 0 || ph3Idx >= 0 || isPhase4) {
        const projQ = p.projects.reduce(function(s, pr) { return s + (pr.kvalitet || 0); }, 0);
        const projH = p.projects.reduce(function(s, pr) { return s + (pr.hallbarhet || 0); }, 0);
        const maxProjT = p.projects.reduce(function(m, pr) { return Math.max(m, pr.tid || 0); }, 0);
        const totalQ = 4 + projQ + p.q_krav - (p.rb_spent_q || 0);
        const totalH = 4 + projH + p.h_krav - (p.rb_spent_h || 0);
        const baseT = 12 + maxProjT;
        const totalT = Math.max(8, baseT - (p.rb_spent_t || 0));
        const totalAnsk = p.projects.reduce(function(s, pr) { return s + (pr.anskaffning || 0); }, 0);
        const projKost = p.dev_cost_total || p.projects.reduce(function(s, pr) { return s + (pr.kostnad || 0); }, 0);
        const markKost = 15;
        const expKost = (p.mark_expansions || 0) * 5;
        const totalKost = projKost + markKost + expKost;
        const totalBta = p.projects.reduce(function(s, pr) { return s + (pr.bta || 0); }, 0);
        html += '<div class="asset-card" style="border-left-color:#4db8ff;background:#0f1923">';
        html += '<div class="asset-label" style="color:#4db8ff">Sammanst\u00e4llning</div>';
        html += '<div style="display:grid;grid-template-columns:1fr 1fr;gap:4px 16px;font-size:14px">';
        // Calculate planning totals (reusable across phases)
        var choices = p.pl_choices || {};
        var plEvts = p.pl_events || {};
        var plQ = 0, plH = 0, plT = 0, plErf = 0, plCost = 0, plEvQ = 0, plEvH = 0, plEvT = 0, plEvAbt = 0;
        for (var k in choices) { var ch = choices[k]; plQ += ch.q||0; plH += ch.h||0; plT += ch.t||0; plErf += ch.erf||0; plCost += ch.cost||0; }
        for (var k in plEvts) { var ev = plEvts[k]; plEvQ += ev.q||0; plEvH += ev.h||0; plEvT += ev.t||0; plEvAbt += ev.abt||0; }
        var gfP = p.gf_phases || {};
        var gfQ = 0, gfH = 0, gfT = 0, gfAbt = 0;
        for (var f in gfP) { gfQ += gfP[f].q||0; gfH += gfP[f].h||0; gfT += gfP[f].t||0; gfAbt += gfP[f].abt||0; }

        // PC/AC direct bonuses (Q, H, T, Rb, Erfarenhet)
        var pcQ = p.projektchef ? (p.projektchef.q_bonus || 0) : 0;
        var pcH = p.projektchef ? (p.projektchef.h_bonus || 0) : 0;
        var pcT = p.projektchef ? (p.projektchef.t_bonus || 0) : 0;
        var pcRb = p.projektchef ? (p.projektchef.rb || 0) : 0;
        var pcErf = p.projektchef ? (p.projektchef.erfarenhet || 0) : 0;
        var acQ = p.arbetschef ? (p.arbetschef.q_bonus || 0) : 0;
        var acH = p.arbetschef ? (p.arbetschef.h_bonus || 0) : 0;
        var acT = p.arbetschef ? (p.arbetschef.t_bonus || 0) : 0;
        var acRb = p.arbetschef ? (p.arbetschef.rb || 0) : 0;
        var acErf = p.arbetschef ? (p.arbetschef.erfarenhet || 0) : 0;
        var konsTimeQ = p.gf_kons_t_q || 0;  // Q reduction from time consequence cards
        var konsTimeH = p.gf_kons_t_h || 0;  // H reduction from time consequence cards
        var curQ = plQ + plEvQ + gfQ + pcQ + acQ + konsTimeQ;
        var curH = plH + plEvH + gfH + pcH + acH + konsTimeH;
        var curT = Math.max(8, totalT + plT + plEvT + gfT - pcT - acT);
        var konsAbt = (p.gf_kons_q||0) + (p.gf_kons_h||0) + (p.gf_kons_t||0) + (p.gf_garanti_abt||0);
        var totalAbtUsed = plCost + plEvAbt + gfAbt + konsAbt;
        var anskKvar = totalAnsk - totalKost - totalAbtUsed;

        html += '<div>Q-krav: <strong>' + totalQ + '</strong></div>';
        html += '<div>H-krav: <strong>' + totalH + '</strong></div>';
        if (isPhase2 || isPhase3) {
            html += '<div>Q: <strong style="color:' + (curQ >= totalQ ? '#27ae60' : '#e74c3c') + '">(' + curQ + ')' + totalQ + '</strong></div>';
            html += '<div>H: <strong style="color:' + (curH >= totalH ? '#27ae60' : '#e74c3c') + '">(' + curH + ')' + totalH + '</strong></div>';
        }
        html += '<div>T: <strong style="color:' + (curT <= 12 ? '#27ae60' : '#e74c3c') + '">' + curT + '</strong> m\u00e5n <span style="color:#999">(m\u00e5l: 12, start: ' + baseT + ')</span></div>';
        var totalRb = (p.riskbuffertar || 0) + pcRb + acRb;
        var totalErf = plErf + pcErf + acErf;
        html += '<div style="grid-column:1/-1">' + counterRow('Riskbuffertar (Rb)', p.riskbuffertar || 0, 'riskbuffertar', false) + '</div>';
        html += '<div>Erf: <strong>' + totalErf + '</strong></div>';
        html += '<div>Projekt: <strong>' + p.projects.length + '</strong></div>';
        html += '<div>Anskaff: <strong>' + totalAnsk + ' Mkr</strong></div>';
        html += '<div>Utv.kostn: <strong>' + totalKost + ' Mkr</strong></div>';
        if (isPhase2 || isPhase3) {
            html += '<div>Anskaff kvar: <strong style="color:' + (anskKvar >= 0 ? '#27ae60' : '#e74c3c') + '">' + Math.round(anskKvar) + ' Mkr</strong></div>';
        }
        html += '<div>BTA: <strong>' + totalBta + ' kvm</strong></div>';
        if (isPhase3) {
            // Tidskort Q/H impact: reduce krav
            var tidQAdj = p.gf_kons_t_q_adj || 0;
            var tidHAdj = p.gf_kons_t_h_adj || 0;
            var adjTotalQ = totalQ - tidQAdj;
            var adjTotalH = totalH - tidHAdj;
            // Konsekvenskort count
            var konsQ = Math.max(0, adjTotalQ - curQ);
            var konsH = Math.max(0, adjTotalH - curH);
            var konsT = Math.max(0, curT - 12);
            html += '<div style="grid-column:1/-1;border-top:1px solid #334;padding-top:4px;margin-top:4px">';
            html += 'Konsekv.kort: Q:' + konsQ + ' H:' + konsH + ' T:' + konsT + ' = <strong>' + (konsQ+konsH+konsT) + ' kort</strong>';
            if (tidQAdj || tidHAdj) {
                html += ' <span style="color:#e67e22;font-size:12px">(tidskort: Q-' + tidQAdj + ' H-' + tidHAdj + ')</span>';
            }
            html += '</div>';
        }
        // TB & TG (after genomförande)
        if (isPhase3 || isPhase4) {
            var tb = anskKvar;
            var tg = (totalAnsk > 0) ? Math.round((tb / totalAnsk) * 100) : 0;
            html += '<div style="grid-column:1/-1;border-top:1px solid #334;padding-top:4px;margin-top:4px">';
            html += 'TB: <strong style="color:' + (tb >= 0 ? '#27ae60' : '#e74c3c') + '">' + Math.round(tb) + ' Mkr</strong>';
            html += ' &nbsp; TG: <strong style="color:' + (tg >= 20 ? '#27ae60' : (tg >= 0 ? '#f0c929' : '#e74c3c')) + '">' + tg + '%</strong>';
            html += '</div>';
            // Moderbolagslån
            var _modAntal = p.gf_moderbolagslan_antal || 0;
            if (_modAntal > 0) {
                html += '<div style="grid-column:1/-1;color:#e74c3c;font-weight:600">';
                html += '\ud83d\udfe5 Moderbolags\u00e5n: ' + _modAntal + ' st = <strong>' + (_modAntal * 100) + ' Mkr skuld</strong></div>';
            }
            html += '<div style="grid-column:1/-1">';
            html += 'Kassa: <strong style="color:' + ((p.eget_kapital||0) >= 0 ? '#27ae60' : '#e74c3c') + '">' + Math.round(p.eget_kapital||0) + ' Mkr</strong></div>';
            if ((p.eget_kapital||0) < 0) {
                // In Phase 3: count non-BRF projects (future fastigheter). In Phase 4: count actual fastigheter.
                var _ownedCount = isPhase4
                    ? (p.fastigheter||[]).filter(function(f){return !f.sold;}).length
                    : (p.projects||[]).filter(function(pr){return pr.typ !== 'BRF';}).length;
                html += '<div style="grid-column:1/-1;background:#e74c3c;color:white;padding:8px 12px;border-radius:6px;margin-top:4px;font-weight:600">';
                html += '\u26a0\ufe0f Kassan \u00e4r negativ! ';
                if (_ownedCount > 1) {
                    html += 'S\u00e4lj fastigheter ner till 1 st, eller ta moderbola\u200dgs\u00e5n (+95 Mkr/st).';
                } else {
                    html += 'Ta moderbola\u200dgs\u00e5n f\u00f6r att t\u00e4cka underskottet (+95 Mkr/st, skuld 100 Mkr/st).';
                }
                html += '</div>';
            }
        }
        // Projected score indicator with ranking + tier
        if (_projScore) {
            var _tier = getTier(_projScore);
            html += '<div style="grid-column:1/-1;border-top:1px solid #334;padding-top:6px;margin-top:6px">';
            html += 'Vinstchans: ' + renderTrendScore(_projScore, _prevScore);
            // Show cached ranking if available
            if (S.lastLeaderboard) {
                var _lb = S.lastLeaderboard;
                var _myEntry = (_lb.players || []).find(function(e) { return e.id === S.playerId; });
                if (_myEntry) {
                    html += ' <span style="color:' + rankColor(_myEntry.rank) + ';font-weight:700;margin-left:6px">';
                    html += '#' + _myEntry.rank + ' av ' + (_lb.total_players || _lb.players.length) + '</span>';
                }
            }
            html += ' ' + tierBadge(_projScore);
            html += '</div>';
        }
        html += '</div></div>';
    }

    container.innerHTML = html;
    attachPlayerEvents(container);

    // Periodically fetch leaderboard for ranking data
    if (S.roomCode && !S._leaderboardTimer) {
        _fetchLeaderboard();
        S._leaderboardTimer = setInterval(_fetchLeaderboard, 10000);
    }

    // Help icon click
    const helpBtn = document.getElementById('btn-help-step');
    if (helpBtn) {
        helpBtn.addEventListener('click', function() {
            showHelpPopup(st.step_name, st.step_help);
        });
    }
}

var _playerLocked = false;
function counterRow(label, val, key, allowNeg) {
    if (_playerLocked) {
        return '<div class="counter-row">' +
            '<div class="label">' + label + '</div>' +
            '<div class="counter-controls">' +
                '<div class="counter-val">' + val + '</div>' +
            '</div>' +
        '</div>';
    }
    return '<div class="counter-row">' +
        '<div class="label">' + label + '</div>' +
        '<div class="counter-controls">' +
            '<button class="counter-btn" data-action="decr" data-key="' + key + '"' +
                (allowNeg ? ' data-allow-neg="1"' : '') + '>\u2212</button>' +
            '<div class="counter-val">' + val + '</div>' +
            '<button class="counter-btn" data-action="incr" data-key="' + key + '">+</button>' +
        '</div>' +
    '</div>';
}

function attachPlayerEvents(container) {
    // Klar / Undo buttons
    container.querySelectorAll('[data-action="mark-done"]').forEach(function(el) {
        el.addEventListener('click', function() {
            send({ type: 'mark_done', step: el.dataset.step });
        });
    });
    container.querySelectorAll('[data-action="unmark-done"]').forEach(function(el) {
        el.addEventListener('click', function(e) {
            e.stopPropagation();
            send({ type: 'unmark_done', step: el.dataset.step });
        });
    });
    container.querySelectorAll('[data-action="choose-pc"]').forEach(el => {
        el.addEventListener('click', () => openPCModal());
    });
    container.querySelectorAll('[data-action="remove-pc"]').forEach(el => {
        el.addEventListener('click', () => {
            send({ type: 'update_assets', assets: { projektchef: null } });
        });
    });
    container.querySelectorAll('[data-action="choose-ac"]').forEach(el => {
        el.addEventListener('click', () => openACModal());
    });
    container.querySelectorAll('[data-action="remove-ac"]').forEach(el => {
        el.addEventListener('click', () => {
            send({ type: 'update_assets', assets: { arbetschef: null } });
        });
    });
    container.querySelectorAll('[data-action="add-project-type"]').forEach(el => {
        el.addEventListener('click', () => openProjectModal(el.dataset.typ));
    });
    container.querySelectorAll('[data-action="remove-project"]').forEach(el => {
        el.addEventListener('click', () => {
            const id = el.dataset.id;
            const projects = S.state.player.projects.filter(p => p.id !== id);
            send({ type: 'update_assets', assets: { projects } });
        });
    });
    container.querySelectorAll('[data-action="rb-incr"]').forEach(el => {
        el.addEventListener('click', () => {
            const target = el.dataset.target;
            const key = 'rb_spent_' + target;
            const cur = S.state.player[key] || 0;
            const totalSpent = (S.state.player.rb_spent_q || 0) + (S.state.player.rb_spent_h || 0) + (S.state.player.rb_spent_t || 0);
            if (totalSpent < S.state.player.riskbuffertar) {
                send({ type: 'update_assets', assets: { [key]: cur + 1 } });
            }
        });
    });
    container.querySelectorAll('[data-action="rb-decr"]').forEach(el => {
        el.addEventListener('click', () => {
            const target = el.dataset.target;
            const key = 'rb_spent_' + target;
            const cur = S.state.player[key] || 0;
            if (cur > 0) send({ type: 'update_assets', assets: { [key]: cur - 1 } });
        });
    });
    container.querySelectorAll('[data-action="toggle-section"]').forEach(function(el) {
        el.addEventListener('click', function() {
            var target = document.getElementById(el.dataset.target);
            if (target) {
                var hidden = target.style.display === 'none';
                target.style.display = hidden ? '' : 'none';
                var arrow = el.querySelector('span');
                if (arrow) arrow.textContent = hidden ? '\u25bc' : '\u25b6';
            }
        });
    });
    // Event card +/- per planning step
    container.querySelectorAll('.ev-btn').forEach(function(el) {
        el.addEventListener('click', function(e) {
            e.stopPropagation();
            var stepId = el.dataset.step;
            var field = el.dataset.field;
            var dir = parseInt(el.dataset.dir);
            var plEvents = Object.assign({}, S.state.player.pl_events || {});
            var ev = Object.assign({}, plEvents[stepId] || {});
            ev[field] = (ev[field] || 0) + dir;
            plEvents[stepId] = ev;
            send({ type: 'update_assets', assets: { pl_events: plEvents } });
        });
    });
    // Genomförande fas +/- buttons
    container.querySelectorAll('.gf-btn').forEach(function(el) {
        el.addEventListener('click', function(e) {
            e.stopPropagation();
            var fas = el.dataset.fas;
            var field = el.dataset.field;
            var dir = parseInt(el.dataset.dir);
            var gfPhases = Object.assign({}, S.state.player.gf_phases || {});
            var gf = Object.assign({}, gfPhases[fas] || {});
            gf[field] = (gf[field] || 0) + dir;
            gfPhases[fas] = gf;
            send({ type: 'update_assets', assets: { gf_phases: gfPhases } });
        });
    });
    // Phase 4 quarter +/- buttons
    container.querySelectorAll('.f4-btn').forEach(function(el) {
        el.addEventListener('click', function(e) {
            e.stopPropagation();
            var q = el.dataset.q;
            var field = el.dataset.field;
            var dir = parseInt(el.dataset.dir);
            var f4Q = Object.assign({}, S.state.player.f4_quarters || {});
            var qd = Object.assign({}, f4Q[q] || {});
            qd[field] = (qd[field] || 0) + dir;
            f4Q[q] = qd;
            send({ type: 'update_assets', assets: { f4_quarters: f4Q } });
        });
    });
    container.querySelectorAll('[data-action="choose-planning"]').forEach(el => {
        el.addEventListener('click', function() { openPlanningModal(el.dataset.stepId); });
    });
    container.querySelectorAll('[data-action="remove-planning"]').forEach(el => {
        el.addEventListener('click', function(e) {
            e.stopPropagation();
            var choices = Object.assign({}, S.state.player.pl_choices || {});
            delete choices[el.dataset.stepId];
            send({ type: 'update_assets', assets: { pl_choices: choices } });
        });
    });
    container.querySelectorAll('[data-action="buy-project-3x"]').forEach(el => {
        el.addEventListener('click', () => openProjectModal(el.dataset.typ, true));
    });
    container.querySelectorAll('[data-action="incr"]').forEach(el => {
        el.addEventListener('click', () => {
            const key = el.dataset.key;
            const cur = S.state.player[key] || 0;
            var assets = { [key]: cur + 1 };
            // Moderbolagslån: each loan adds 95 Mkr to Kassa
            if (key === 'gf_moderbolagslan_antal') {
                assets.eget_kapital = (S.state.player.eget_kapital || 0) + 95;
            }
            send({ type: 'update_assets', assets: assets });
        });
    });
    container.querySelectorAll('[data-action="decr"]').forEach(el => {
        el.addEventListener('click', () => {
            const key = el.dataset.key;
            const cur = S.state.player[key] || 0;
            const min = el.dataset.allowNeg ? -99 : 0;
            var newVal = Math.max(min, cur - 1);
            var assets = { [key]: newVal };
            // Moderbolagslån: removing a loan subtracts 95 Mkr from Kassa
            if (key === 'gf_moderbolagslan_antal' && newVal < cur) {
                assets.eget_kapital = (S.state.player.eget_kapital || 0) - 95;
            }
            send({ type: 'update_assets', assets: assets });
        });
    });
    // Phase 4: FC/FS choose
    container.querySelectorAll('[data-choose="fc"]').forEach(el => {
        el.addEventListener('click', () => openFCFSModal('fc'));
    });
    container.querySelectorAll('[data-choose="fs"]').forEach(el => {
        el.addEventListener('click', () => openFCFSModal('fs'));
    });
    // Phase 4: Remove FS from list
    container.querySelectorAll('.f4-remove-fs').forEach(function(el) {
        el.addEventListener('click', function() {
            var fsi = parseInt(el.dataset.fsi);
            var p = S.state.player;
            var fsList = Array.isArray(p.fastighetsskotare) ? p.fastighetsskotare.slice() : (p.fastighetsskotare ? [p.fastighetsskotare] : []);
            fsList.splice(fsi, 1);
            send({ type: 'update_assets', assets: { fastighetsskotare: fsList } });
        });
    });
    // Phase 4: Convert projects to fastigheter
    container.querySelectorAll('[data-action="convert_projects"]').forEach(el => {
        el.addEventListener('click', () => {
            var p = S.state.player;
            var fasts = [];
            var brfEk = 0;
            for (var pr of (p.projects || [])) {
                if (pr.typ === 'BRF') {
                    // BRF sold: EK += MV - anskaffning
                    brfEk += (pr.marknadsvarde || pr.anskaffning) - pr.anskaffning;
                } else {
                    fasts.push({
                        id: pr.id, namn: pr.namn, typ: pr.typ, bta: pr.bta,
                        anskaffning: pr.anskaffning, energiklass: pr.energiklass || 'D',
                        marknadsvarde: pr.marknadsvarde || pr.anskaffning,
                        driftnetto: pr.driftnetto || 0,
                        events: [], sold: false, kopeskilling: 0
                    });
                }
            }
            send({ type: 'update_assets', assets: {
                fastigheter: fasts,
                eget_kapital: (p.eget_kapital || 0) + brfEk
            }});
        });
    });
    // Phase 4: Energiklass buttons (with cost confirmation)
    container.querySelectorAll('.f4-eklass-btn').forEach(function(el) {
        el.addEventListener('click', function() {
            var fi = parseInt(el.dataset.fi);
            var fasts = JSON.parse(JSON.stringify(S.state.player.fastigheter || []));
            if (fasts[fi]) {
                var oldEk = fasts[fi].energiklass || 'D';
                var newEk = el.dataset.eklass;
                if (oldEk === newEk) return;
                var klasser = ['F','E','D','C','B','A'];
                var oldIdx = klasser.indexOf(oldEk);
                var newIdx = klasser.indexOf(newEk);
                var stepsCount = Math.abs(newIdx - oldIdx);
                var isUpgrade = newIdx > oldIdx;
                var defaultCost = isUpgrade ? stepsCount * 5 : 0;
                var costStr = prompt('\u00c4ndra energiklass fr\u00e5n ' + oldEk + ' till ' + newEk + '?\nKostnad f\u00f6r energiklass\u00e4ndring (Mkr):', defaultCost);
                if (costStr === null) return; // cancelled
                var cost = parseFloat(costStr.replace(',','.')) || 0;
                fasts[fi].energiklass = newEk;
                var assets = { fastigheter: fasts };
                if (cost > 0) {
                    assets.eget_kapital = (S.state.player.eget_kapital || 0) - cost;
                }
                send({ type: 'update_assets', assets: assets });
            }
        });
    });
    // Phase 4: Toggle events per fastighet (persistent state)
    container.querySelectorAll('.f4-toggle-events').forEach(function(el) {
        el.addEventListener('click', function() {
            var fid = el.dataset.fid;
            var list = document.getElementById('f4-events-' + el.dataset.fi);
            if (list) {
                var showing = list.style.display === 'none';
                list.style.display = showing ? '' : 'none';
                if (showing) S.expandedFastEvents.add(fid);
                else S.expandedFastEvents.delete(fid);
            }
        });
    });
    // Phase 4: Event +/- per fastighet per kvartal
    container.querySelectorAll('.f4-ev-btn').forEach(function(el) {
        el.addEventListener('click', function(e) {
            e.stopPropagation();
            var fi = parseInt(el.dataset.fi);
            var q = parseInt(el.dataset.q);
            var field = el.dataset.f;
            var dir = parseFloat(el.dataset.d);
            var fasts = JSON.parse(JSON.stringify(S.state.player.fastigheter || []));
            if (!fasts[fi]) return;
            if (!fasts[fi].events) fasts[fi].events = [];
            var ev = fasts[fi].events.find(function(e) { return e.kvartal === q; });
            if (!ev) { ev = { kvartal: q, ek: 0, energi: 0 }; fasts[fi].events.push(ev); }
            if (field === 'energi') {
                // Shift energiklass
                var klasser = ['A','B','C','D','E','F'];
                var idx = klasser.indexOf(fasts[fi].energiklass || 'D');
                idx = Math.max(0, Math.min(5, idx - dir)); // up=better=lower idx
                fasts[fi].energiklass = klasser[idx];
            } else {
                ev[field] = (ev[field] || 0) + dir;
            }
            send({ type: 'update_assets', assets: { fastigheter: fasts } });
        });
    });
    // Phase 4: Yield +/-
    container.querySelectorAll('.f4-yield-btn').forEach(function(el) {
        el.addEventListener('click', function(e) {
            e.stopPropagation();
            var typ = el.dataset.type;
            var dir = parseFloat(el.dataset.d);
            var key = 'f4_yield_' + typ;
            var cur = S.state.player[key] || 4.5;
            send({ type: 'update_assets', assets: { [key]: Math.max(0.25, cur + dir) } });
        });
    });
    // Phase 4: Sell fastighet
    container.querySelectorAll('.f4-sell-btn').forEach(function(el) {
        el.addEventListener('click', function() {
            var fi = parseInt(el.dataset.fi);
            var kopeskilling = prompt('Ange köpeskilling (Mkr):');
            if (kopeskilling === null) return;
            kopeskilling = parseFloat(kopeskilling.replace(',','.')) || 0;
            var fasts = JSON.parse(JSON.stringify(S.state.player.fastigheter || []));
            if (fasts[fi]) {
                fasts[fi].sold = true;
                fasts[fi].kopeskilling = kopeskilling;
                send({ type: 'update_assets', assets: {
                    fastigheter: fasts,
                    eget_kapital: (S.state.player.eget_kapital || 0) + kopeskilling
                }});
            }
        });
    });
    // Phase 4: Driftnetto now auto-added in render (no manual button needed)
    // Phase 4: Quarter adjustments (omvärldskort / kvartalshändelse Kassa effects)
    container.querySelectorAll('.f4-q-adj-btn').forEach(function(el) {
        el.addEventListener('click', function() {
            var _step = el.dataset.step;
            var _field = el.dataset.field; // 'omvarld_ek' or 'handelse_ek'
            var _delta = parseFloat(el.dataset.d) || 0;
            var f4Q = JSON.parse(JSON.stringify(S.state.player.f4_quarters || {}));
            if (!f4Q[_step]) f4Q[_step] = {};
            f4Q[_step][_field] = (f4Q[_step][_field] || 0) + _delta;
            // Also update Kassa (eget_kapital) directly
            var newEk = (S.state.player.eget_kapital || 0) + _delta;
            send({ type: 'update_assets', assets: { f4_quarters: f4Q, eget_kapital: newEk } });
        });
    });
    // Phase 4: Buy fastighet — single modal with all types grouped by header
    container.querySelectorAll('[data-action="buy_fastighet"]').forEach(function(el) {
        el.addEventListener('click', async function() {
            if (!S._allProjects) {
                try { var r = await fetch('/api/companion/data/projects'); var _pdata = await r.json(); S._allProjects = _pdata.projects || _pdata; } catch(e) { return; }
            }
            var mc = document.getElementById('modal-container');
            var types = ['F\u00d6RSKOLOR','LOKAL','KONTOR','Hyresr\u00e4tt'];
            var _p = S.state.player;
            var html = '<div class="modal-overlay"><div class="modal">';
            html += '<div class="modal-header"><h3>K\u00f6p fastighet fr\u00e5n marknaden</h3></div>';
            html += '<div class="modal-body">';
            for (var t of types) {
                var projs = S._allProjects[t] || [];
                if (projs.length === 0) continue;
                html += '<div style="font-size:12px;color:#888;text-transform:uppercase;letter-spacing:1px;padding:8px 0 4px;border-bottom:1px solid #334;margin-top:4px">' + t + '</div>';
                for (var pr of projs) {
                    var _isBost = (pr.typ === 'Hyresr\u00e4tt');
                    var _yld = _isBost ? (_p.f4_yield_bostader||4.0) : (_p.f4_yield_kommersiellt||5.0);
                    var _dn = pr.driftnetto || 0;
                    var _eklF = {'A':1.10,'B':1.05,'C':1.00,'D':0.95,'E':0.90,'F':0.85}[(pr.energiklass||'C').toUpperCase()] || 1.0;
                    var _mv = _yld > 0 ? Math.round((4 * _dn) / (_yld / 100) * _eklF) : 0;
                    html += '<div class="modal-item" data-proj=\'' + JSON.stringify(pr).replace(/'/g,"&#39;") + '\'>';
                    html += '<div class="item-name">' + pr.namn + '</div>';
                    html += '<div class="item-detail">BTA: ' + pr.bta + ' | DN: ' + _dn + ' Mkr/kv | EK: ' + pr.energiklass + ' | <strong style="color:#27ae60">MV: ' + _mv + ' Mkr</strong></div>';
                    html += '</div>';
                }
            }
            html += '</div><button id="modal-cancel" class="btn-secondary" style="width:100%;padding:12px;margin-top:8px;border:none;border-radius:8px;cursor:pointer">Avbryt</button>';
            html += '</div></div>';
            mc.innerHTML = html;
            mc.querySelector('#modal-cancel').addEventListener('click', function() { mc.innerHTML = ''; });
            mc.querySelectorAll('[data-proj]').forEach(function(pEl) {
                pEl.addEventListener('click', function() {
                    var proj = JSON.parse(pEl.dataset.proj);
                    var kopeskilling = parseFloat(prompt('K\u00f6peskilling (Mkr):') || '0');
                    if (!kopeskilling) { mc.innerHTML = ''; return; }
                    var _step = S.state.step;
                    var fasts = JSON.parse(JSON.stringify(S.state.player.fastigheter || []));
                    fasts.push({
                        id: 'KOP-' + Date.now(), namn: proj.namn, typ: proj.typ, bta: proj.bta,
                        anskaffning: kopeskilling, energiklass: proj.energiklass || 'D',
                        driftnetto: proj.driftnetto || 0,
                        marknadsvarde: kopeskilling, events: [], sold: false, kopeskilling: kopeskilling
                    });
                    var _mktBought = Object.assign({}, S.state.player.f4_market_bought || {});
                    _mktBought[_step] = (_mktBought[_step] || 0) + 1;
                    send({ type: 'update_assets', assets: {
                        fastigheter: fasts,
                        eget_kapital: (S.state.player.eget_kapital || 0) - kopeskilling,
                        f4_market_bought: _mktBought
                    }});
                    showDDKortModal(proj.namn, kopeskilling);
                });
            });
        });
    });
}
