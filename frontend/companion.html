<!DOCTYPE html>
<html lang="sv">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>PMOPOLY Companion</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'Segoe UI', system-ui, sans-serif; background: #0f1923; color: #e0e0e0; min-height: 100vh; }

/* Views */
.view { display: none; }
.view.active { display: flex; flex-direction: column; min-height: 100vh; }

/* ── Lobby ── */
.lobby { align-items: center; justify-content: center; padding: 20px; gap: 20px; }
.lobby h1 { color: #f0c929; font-size: 28px; }
.lobby p { color: #999; margin-bottom: 10px; }
.lobby-card { background: #1a2736; border-radius: 12px; padding: 24px; width: 100%; max-width: 400px; }
.lobby-card h2 { color: #f0c929; margin-bottom: 12px; font-size: 18px; }
.lobby-card input, .lobby-card select { width: 100%; padding: 12px; border-radius: 8px; border: 1px solid #334; background: #0f1923; color: #e0e0e0; font-size: 16px; margin-bottom: 10px; }
.lobby-card button { width: 100%; padding: 14px; border-radius: 8px; border: none; font-size: 16px; font-weight: 700; cursor: pointer; margin-top: 6px; }
.btn-primary { background: #f0c929; color: #1a1a2e; }
.btn-secondary { background: #2a3a4a; color: #e0e0e0; }
.or-divider { text-align: center; color: #666; margin: 10px 0; font-size: 14px; }
.quarter-select { display: none; margin-top: 10px; }
.quarter-select.show { display: block; }
.quarter-btn { display: block; width: 100%; padding: 12px; margin-bottom: 6px; border-radius: 8px; border: 2px solid #334; background: #1a2736; color: #e0e0e0; font-size: 15px; cursor: pointer; text-align: left; }
.quarter-btn:hover { border-color: #f0c929; }
.quarter-btn .count { float: right; color: #888; font-size: 13px; }

/* ── Player View ── */
.player-view { padding: 12px; padding-bottom: 80px; }
.phase-header { background: linear-gradient(135deg, #1a2736, #243447); border-radius: 10px; padding: 14px; margin-bottom: 12px; text-align: center; }
.phase-header .phase-name { color: #f0c929; font-size: 18px; font-weight: 700; }
.phase-header .step-name { color: #4db8ff; font-size: 14px; margin-top: 4px; }

.assets-grid { display: flex; flex-direction: column; gap: 10px; }

/* Asset card */
.asset-card { background: #1a2736; border-radius: 10px; padding: 14px; border-left: 4px solid #444; }
.asset-card.pc { border-left-color: #8B7355; }
.asset-card.projects { border-left-color: #2E7D32; }
.asset-card.counters { border-left-color: #1565C0; }
.asset-card.economy { border-left-color: #f0c929; }

.asset-label { color: #999; font-size: 12px; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 6px; }
.asset-value { font-size: 16px; font-weight: 600; }
.asset-empty { color: #555; font-style: italic; cursor: pointer; padding: 8px 0; }
.asset-empty:hover { color: #f0c929; }

/* Chosen PC/project display */
.chosen-item { display: flex; align-items: center; gap: 10px; padding: 6px 0; cursor: pointer; }
.chosen-item .dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }
.chosen-item .name { font-weight: 600; }
.chosen-item .detail { color: #888; font-size: 13px; }
.chosen-item .remove-btn { margin-left: auto; color: #c0392b; cursor: pointer; font-size: 18px; padding: 0 4px; }

/* Counter row */
.counter-row { display: flex; align-items: center; justify-content: space-between; padding: 6px 0; }
.counter-row .label { font-size: 14px; }
.counter-controls { display: flex; align-items: center; gap: 8px; }
.counter-btn { width: 36px; height: 36px; border-radius: 50%; border: 2px solid #444; background: transparent; color: #e0e0e0; font-size: 20px; cursor: pointer; display: flex; align-items: center; justify-content: center; }
.counter-btn:active { background: #334; }
.counter-val { font-size: 20px; font-weight: 700; min-width: 30px; text-align: center; }

/* Project type buttons */
.proj-type-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 6px; margin-top: 8px; }
.proj-type-btn { padding: 10px 6px; border-radius: 8px; border: 2px solid #334; background: #0f1923; color: #e0e0e0; font-size: 13px; font-weight: 600; cursor: pointer; text-align: center; }
.proj-type-btn:hover { border-color: #f0c929; }

/* ── GM Dashboard ── */
.gm-view { padding: 12px; }
.gm-header { display: flex; justify-content: space-between; align-items: center; padding: 12px; background: #1a2736; border-radius: 10px; margin-bottom: 12px; }
.gm-header .room-code { font-size: 24px; font-weight: 900; color: #f0c929; letter-spacing: 4px; }
.gm-controls { display: flex; gap: 8px; }
.gm-controls button { padding: 10px 20px; border-radius: 8px; border: none; font-size: 14px; font-weight: 700; cursor: pointer; }
.btn-prev { background: #2a3a4a; color: #e0e0e0; }
.btn-next { background: #27ae60; color: white; }

.gm-phase-bar { text-align: center; padding: 8px; margin-bottom: 12px; }
.gm-phase-bar .phase { color: #f0c929; font-size: 16px; font-weight: 700; }
.gm-phase-bar .step { color: #4db8ff; font-size: 14px; }

.quarters-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 12px; }
.quarter-card { background: #1a2736; border-radius: 10px; padding: 14px; border-top: 3px solid #f0c929; }
.quarter-card h3 { color: #f0c929; margin-bottom: 8px; }
.quarter-stat { display: flex; justify-content: space-between; padding: 4px 0; font-size: 14px; }
.quarter-stat .val { font-weight: 700; }
.quarter-players { margin-top: 8px; font-size: 13px; color: #888; }
.quarter-players span { display: inline-block; background: #243447; padding: 2px 8px; border-radius: 4px; margin: 2px; }

/* ── Modal ── */
.modal-overlay { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.7); z-index: 1000; display: flex; align-items: center; justify-content: center; padding: 16px; }
.modal { background: #1a2736; border-radius: 12px; max-width: 500px; width: 100%; max-height: 80vh; overflow-y: auto; }
.modal-header { padding: 16px; border-bottom: 1px solid #334; }
.modal-header h3 { color: #f0c929; }
.modal-body { padding: 16px; }
.modal-item { padding: 12px; border-radius: 8px; border: 2px solid #334; margin-bottom: 8px; cursor: pointer; }
.modal-item:hover { border-color: #f0c929; background: #243447; }
.modal-item.selected { border-color: #27ae60; background: #1a3a2a; }
.modal-item .item-name { font-weight: 700; font-size: 15px; }
.modal-item .item-detail { color: #999; font-size: 13px; margin-top: 4px; }
.modal-footer { padding: 12px 16px; border-top: 1px solid #334; display: flex; gap: 8px; }
.modal-footer button { flex: 1; padding: 12px; border-radius: 8px; border: none; font-size: 15px; font-weight: 700; cursor: pointer; }

/* GM Table */
.gm-tab.active { background: #f0c929 !important; color: #1a1a2e !important; }
.gm-table { width: 100%; border-collapse: collapse; font-size: 13px; }
.gm-table th { background: #243447; padding: 8px 10px; text-align: left; color: #f0c929; font-size: 12px; text-transform: uppercase; position: sticky; top: 0; }
.gm-table td { padding: 6px 10px; border-bottom: 1px solid #1a2736; }
.gm-table tr:hover td { background: #1a2736; }
.status-done { color: #27ae60; font-weight: 700; }
.status-wait { color: #c0392b; }
.score-bar { display: inline-block; height: 14px; border-radius: 3px; background: linear-gradient(90deg, #27ae60, #f0c929); min-width: 4px; vertical-align: middle; margin-right: 6px; }
</style>
</head>
<body>

<!-- LOBBY (player only) -->
<div id="view-lobby" class="view active lobby">
    <h1>PMOPOLY</h1>
    <p>Companion App</p>

    <div class="lobby-card">
        <h2>Gå med i kvarter</h2>
        <input type="text" id="player-name" placeholder="Ditt namn" maxlength="20">
        <input type="text" id="room-code" placeholder="Kvarterskod (4 tecken)" maxlength="4" style="text-transform:uppercase">
        <button class="btn-primary" id="btn-join-quarter">Gå med</button>
    </div>
</div>

<!-- GM LOBBY (separate) -->
<div id="view-gm-lobby" class="view lobby">
    <h1>PMOPOLY</h1>
    <p>Game Master</p>

    <div class="lobby-card">
        <h2>Skapa kvarter</h2>
        <input type="number" id="gm-quarters" value="4" min="1" max="20" placeholder="Antal kvarter">
        <button class="btn-primary" id="btn-create-room">Skapa kvarter</button>
    </div>
</div>

<!-- PLAYER VIEW -->
<div id="view-player" class="view player-view">
    <div class="phase-header">
        <div class="phase-name" id="p-phase-name">—</div>
        <div class="step-name" id="p-step-name">Väntar på Game Master...</div>
    </div>
    <div class="assets-grid" id="player-assets"></div>
</div>

<!-- GM VIEW -->
<div id="view-gm" class="view gm-view">
    <div class="gm-header">
        <div>
            <div style="color:#888;font-size:12px">RUMSKOD</div>
            <div class="room-code" id="gm-room-code">—</div>
        </div>
        <div class="gm-controls">
            <button class="btn-prev" id="btn-prev-step">◀ Föregående</button>
            <button class="btn-next" id="btn-next-step">Nästa steg ▶</button>
        </div>
    </div>
    <div class="gm-phase-bar">
        <div class="phase" id="gm-phase-name">—</div>
        <div class="step" id="gm-step-name">—</div>
        <div style="margin-top:6px"><a id="gm-dashboard-link" href="#" target="_blank" style="color:#4db8ff;font-size:13px">Öppna extern dashboard</a></div>
    </div>

    <!-- Tab switcher -->
    <div style="display:flex;gap:8px;margin-bottom:12px">
        <button class="btn-secondary gm-tab active" data-tab="table" style="flex:1;padding:8px">Spelaröversikt</button>
        <button class="btn-secondary gm-tab" data-tab="quarters" style="flex:1;padding:8px">Kvarter</button>
    </div>

    <!-- Table view -->
    <div id="gm-table-view" class="gm-tab-content">
        <div style="overflow-x:auto"><table id="gm-player-table" class="gm-table"></table></div>
    </div>

    <!-- Quarters view -->
    <div id="gm-quarters-view" class="gm-tab-content" style="display:none">
        <div class="quarters-grid" id="gm-quarters"></div>
    </div>
</div>

<!-- MODAL CONTAINER -->
<div id="modal-container"></div>

<script type="module">
// ── State ──
const S = {
    ws: null,
    playerId: null,
    roomCode: null,
    isGM: false,
    state: null,
    pcData: [],
    projectData: {},
};

function showView(id) {
    document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
    document.getElementById(id).classList.add('active');
}

// Show GM lobby if URL is /companion/gm
if (location.pathname.endsWith('/gm')) {
    showView('view-gm-lobby');
}

// ── WebSocket ──
function connectWs(code, playerId) {
    const proto = location.protocol === 'https:' ? 'wss:' : 'ws:';
    const url = `${proto}//${location.host}/companion/ws/${code}/${playerId}`;
    const ws = new WebSocket(url);
    ws.onopen = () => console.log('WS connected');
    ws.onmessage = (e) => {
        const data = JSON.parse(e.data);
        if (data.type === 'state') {
            S.state = data.state;
            render();
        }
    };
    ws.onclose = () => setTimeout(() => connectWs(code, playerId), 3000);
    S.ws = ws;
}

function send(data) {
    if (S.ws && S.ws.readyState === WebSocket.OPEN) {
        S.ws.send(JSON.stringify(data));
    }
}

// ── Lobby ──
document.getElementById('btn-create-room').addEventListener('click', async () => {
    const num = parseInt(document.getElementById('gm-quarters').value) || 4;
    const res = await fetch('/api/companion/rooms', {
        method: 'POST', headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({ num_quarters: num }),
    });
    const data = await res.json();
    S.roomCode = data.code;
    S.playerId = data.gm_id;
    S.isGM = true;
    connectWs(data.code, data.gm_id);
    showView('view-gm');
});

document.getElementById('btn-join-quarter').addEventListener('click', async () => {
    const quarterCode = document.getElementById('room-code').value.trim().toUpperCase();
    const name = document.getElementById('player-name').value.trim();
    if (!quarterCode || !name) { alert('Ange namn och kvarterskod'); return; }

    const res = await fetch('/api/companion/join-quarter', {
        method: 'POST', headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({ name, quarter_code: quarterCode }),
    });
    if (!res.ok) {
        const err = await res.json();
        alert(err.error || 'Kunde inte gå med');
        return;
    }
    const data = await res.json();
    S.roomCode = data.code;
    S.playerId = data.player_id;
    S.isGM = false;
    await loadReferenceData();
    connectWs(data.code, data.player_id);
    showView('view-player');
});

async function loadReferenceData() {
    const [pcRes, projRes] = await Promise.all([
        fetch('/api/companion/data/pc'),
        fetch('/api/companion/data/projects'),
    ]);
    S.pcData = (await pcRes.json()).pc;
    S.projectData = (await projRes.json()).projects;
}

// ── Render ──
function render() {
    if (S.isGM) renderGM();
    else renderPlayer();
}

// ── Player Rendering ──
function renderPlayer() {
    const st = S.state;
    if (!st) return;
    document.getElementById('p-phase-name').textContent = st.phase_name || '—';
    document.getElementById('p-step-name').textContent = st.step_name || 'Väntar...';

    const p = st.player;
    const container = document.getElementById('player-assets');

    let html = '';

    // PC Card
    html += '<div class="asset-card pc">';
    html += '<div class="asset-label">Projektchef</div>';
    if (p.projektchef) {
        html += `<div class="chosen-item">
            <div class="dot" style="background:#8B7355"></div>
            <div><div class="name">${p.projektchef.namn}</div>
            <div class="detail">${p.projektchef.specialisering} | Lön: ${p.projektchef.lon} Mkr</div></div>
            <div class="remove-btn" data-action="remove-pc">✕</div>
        </div>`;
    } else {
        html += '<div class="asset-empty" data-action="choose-pc">+ Välj Projektchef</div>';
    }
    html += '</div>';

    // Projects
    html += '<div class="asset-card projects">';
    html += '<div class="asset-label">Projekt</div>';
    if (p.projects.length > 0) {
        for (const proj of p.projects) {
            const color = { BRF: '#DAA520', FÖRSKOLOR: '#2E7D32', LOKAL: '#1565C0', KONTOR: '#6A1B9A', Hyresrätt: '#C62828' }[proj.typ] || '#888';
            html += `<div class="chosen-item">
                <div class="dot" style="background:${color}"></div>
                <div><div class="name">${proj.namn}</div>
                <div class="detail">${proj.typ} | BTA: ${proj.bta} | Anskaff: ${proj.anskaffning} Mkr</div></div>
                <div class="remove-btn" data-action="remove-project" data-id="${proj.id}">✕</div>
            </div>`;
        }
    }
    html += '<div class="proj-type-grid">';
    for (const typ of ['BRF', 'FÖRSKOLOR', 'LOKAL', 'KONTOR', 'Hyresrätt']) {
        html += `<button class="proj-type-btn" data-action="add-project-type" data-typ="${typ}">${typ}</button>`;
    }
    html += '</div></div>';

    // Counters
    html += '<div class="asset-card counters">';
    html += '<div class="asset-label">Krav & Resurser</div>';
    html += counterRow('Kvalitetskrav', p.q_krav, 'q_krav');
    html += counterRow('Hållbarhetskrav', p.h_krav, 'h_krav');
    html += counterRow('Riskbuffertar', p.riskbuffertar, 'riskbuffertar');
    html += counterRow('Markexpansion', p.mark_expansions, 'mark_expansions');
    html += '</div>';

    // Economy
    html += '<div class="asset-card economy">';
    html += '<div class="asset-label">Ekonomi</div>';
    html += counterRow('Eget kapital (Mkr)', p.eget_kapital, 'eget_kapital');
    html += counterRow('ABT-budget (Mkr)', p.abt_budget, 'abt_budget');
    html += '</div>';

    container.innerHTML = html;
    attachPlayerEvents(container);
}

function counterRow(label, val, key) {
    return `<div class="counter-row">
        <div class="label">${label}</div>
        <div class="counter-controls">
            <button class="counter-btn" data-action="decr" data-key="${key}">−</button>
            <div class="counter-val">${val}</div>
            <button class="counter-btn" data-action="incr" data-key="${key}">+</button>
        </div>
    </div>`;
}

function attachPlayerEvents(container) {
    container.querySelectorAll('[data-action="choose-pc"]').forEach(el => {
        el.addEventListener('click', () => openPCModal());
    });
    container.querySelectorAll('[data-action="remove-pc"]').forEach(el => {
        el.addEventListener('click', () => {
            send({ type: 'update_assets', assets: { projektchef: null } });
        });
    });
    container.querySelectorAll('[data-action="add-project-type"]').forEach(el => {
        el.addEventListener('click', () => openProjectModal(el.dataset.typ));
    });
    container.querySelectorAll('[data-action="remove-project"]').forEach(el => {
        el.addEventListener('click', () => {
            const id = el.dataset.id;
            const projects = S.state.player.projects.filter(p => p.id !== id);
            send({ type: 'update_assets', assets: { projects } });
        });
    });
    container.querySelectorAll('[data-action="incr"]').forEach(el => {
        el.addEventListener('click', () => {
            const key = el.dataset.key;
            const cur = S.state.player[key] || 0;
            send({ type: 'update_assets', assets: { [key]: cur + 1 } });
        });
    });
    container.querySelectorAll('[data-action="decr"]').forEach(el => {
        el.addEventListener('click', () => {
            const key = el.dataset.key;
            const cur = S.state.player[key] || 0;
            send({ type: 'update_assets', assets: { [key]: Math.max(0, cur - 1) } });
        });
    });
}

// ── PC Modal ──
function openPCModal() {
    const mc = document.getElementById('modal-container');
    let html = '<div class="modal-overlay"><div class="modal">';
    html += '<div class="modal-header"><h3>Välj Projektchef</h3></div>';
    html += '<div class="modal-body">';
    for (const pc of S.pcData) {
        const motstand = pc.handelsemotstand || 'ingen';
        const namnd = pc.namnd_bonus ? `, Nämnd +${pc.namnd_bonus}` : '';
        html += `<div class="modal-item" data-pc-id="${pc.id}">
            <div class="item-name">${pc.namn}</div>
            <div class="item-detail">${pc.specialisering} | Lindring: +${pc.kapacitet} (${motstand})${namnd} | Lön: ${pc.lon} Mkr</div>
            <div class="item-detail" style="margin-top:4px;color:#777">${pc.not_text || ''}</div>
        </div>`;
    }
    html += '</div>';
    html += '<div class="modal-footer"><button class="btn-secondary" id="modal-cancel">Avbryt</button></div>';
    html += '</div></div>';
    mc.innerHTML = html;

    mc.querySelectorAll('.modal-item').forEach(el => {
        el.addEventListener('click', () => {
            const pc = S.pcData.find(p => p.id === el.dataset.pcId);
            if (pc) send({ type: 'update_assets', assets: { projektchef: pc } });
            mc.innerHTML = '';
        });
    });
    mc.querySelector('#modal-cancel').addEventListener('click', () => { mc.innerHTML = ''; });
}

// ── Project Modal ──
function openProjectModal(typ) {
    const mc = document.getElementById('modal-container');
    const available = S.projectData[typ] || [];
    const currentIds = new Set((S.state.player.projects || []).map(p => p.id));

    let html = '<div class="modal-overlay"><div class="modal">';
    html += `<div class="modal-header"><h3>${typ}-projekt</h3></div>`;
    html += '<div class="modal-body">';
    for (const proj of available) {
        const sel = currentIds.has(proj.id) ? ' selected' : '';
        html += `<div class="modal-item${sel}" data-proj='${JSON.stringify(proj).replace(/'/g, "&#39;")}'>
            <div class="item-name">${proj.namn || proj.id}</div>
            <div class="item-detail">BTA: ${proj.bta} | Form: ${proj.formfaktor} | Anskaff: ${proj.anskaffning} Mkr | Kostnad: ${proj.kostnad} Mkr</div>
        </div>`;
    }
    html += '</div>';
    html += '<div class="modal-footer"><button class="btn-secondary" id="modal-close">Stäng</button></div>';
    html += '</div></div>';
    mc.innerHTML = html;

    mc.querySelectorAll('.modal-item').forEach(el => {
        el.addEventListener('click', () => {
            const proj = JSON.parse(el.dataset.proj);
            const current = [...(S.state.player.projects || [])];
            const idx = current.findIndex(p => p.id === proj.id);
            if (idx >= 0) {
                current.splice(idx, 1);
                el.classList.remove('selected');
            } else {
                current.push(proj);
                el.classList.add('selected');
            }
            send({ type: 'update_assets', assets: { projects: current } });
        });
    });
    mc.querySelector('#modal-close').addEventListener('click', () => { mc.innerHTML = ''; });
}

// ── GM Rendering ──
function renderGM() {
    const st = S.state;
    if (!st) return;

    document.getElementById('gm-room-code').textContent = st.code;
    document.getElementById('gm-phase-name').textContent = st.phase_name || '—';
    document.getElementById('gm-step-name').textContent = st.step_name || '—';
    document.getElementById('gm-dashboard-link').href = `/companion/dashboard/${st.code}`;

    renderGMTable(st);
    renderGMQuarters(st);
}

function renderGMTable(st) {
    const table = document.getElementById('gm-player-table');
    const allPlayers = (st.quarters || []).flatMap(q =>
        q.players.map(p => ({ ...p, quarter: q.name }))
    );
    const maxScore = Math.max(1, ...allPlayers.map(p => p.profit_score || 0));

    let html = `<thead><tr>
        <th>Kvarter</th><th>Spelare</th><th>Status</th>
        <th>PC</th><th>Projekt</th><th>Q</th><th>H</th><th>Rb</th>
        <th>Vinstchans</th>
    </tr></thead><tbody>`;

    for (const p of allPlayers) {
        const done = p.step_done;
        const statusCls = done ? 'status-done' : 'status-wait';
        const statusTxt = done ? '✓ Klar' : '○ Väntar';
        const pcName = p.projektchef ? p.projektchef.namn : '—';
        const numProj = p.projects?.length || 0;
        const barW = Math.round((p.profit_score / maxScore) * 60);
        html += `<tr>
            <td>${p.quarter}</td>
            <td><strong>${p.name}</strong></td>
            <td class="${statusCls}">${statusTxt}</td>
            <td>${pcName}</td>
            <td>${numProj}</td>
            <td>${p.q_krav}</td>
            <td>${p.h_krav}</td>
            <td>${p.riskbuffertar}</td>
            <td><span class="score-bar" style="width:${barW}px"></span>${p.profit_score}</td>
        </tr>`;
    }
    html += '</tbody>';
    table.innerHTML = html;
}

function renderGMQuarters(st) {
    const grid = document.getElementById('gm-quarters');
    let html = '';
    for (const q of (st.quarters || [])) {
        const done = q.players.filter(p => p.step_done).length;
        const total = q.players.length;
        html += `<div class="quarter-card">
            <h3>
                <span class="q-name" data-qi="${q.quarter_idx}" title="Klicka för att byta namn"
                      style="cursor:pointer;border-bottom:1px dashed #666">${q.name}</span>
                <span style="color:#888;font-size:13px">(${total}/4)</span>
                <span style="float:right;font-size:13px;color:${done===total && total>0 ? '#27ae60' : '#c0392b'}">${done}/${total} klara</span>
            </h3>
            <div class="quarter-stat" style="margin-bottom:6px"><span>Kvarterskod</span><span class="val" style="color:#f0c929;letter-spacing:2px;font-size:16px">${q.code || '—'}</span></div>
            <div class="quarter-stat"><span>Projekt</span><span class="val">${q.total_projects}</span></div>
            <div class="quarter-stat"><span>Total BTA</span><span class="val">${q.total_bta} kvm</span></div>
            <div class="quarter-stat"><span>Snitt Q-krav</span><span class="val">${q.avg_q_krav}</span></div>
            <div class="quarter-stat"><span>Snitt H-krav</span><span class="val">${q.avg_h_krav}</span></div>
            <div class="quarter-players">${q.players.map(p =>
                `<span style="color:${p.step_done ? '#27ae60' : '#ccc'}">${p.name}${p.step_done ? ' ✓' : ''}</span>`
            ).join('')}</div>
        </div>`;
    }
    grid.innerHTML = html;
    grid.querySelectorAll('.q-name').forEach(el => {
        el.addEventListener('click', () => {
            const qi = parseInt(el.dataset.qi);
            const current = el.textContent;
            const newName = prompt('Nytt kvartersnamn:', current);
            if (newName && newName.trim()) {
                send({ type: 'rename_quarter', quarter_idx: qi, name: newName.trim() });
            }
        });
    });
}

// GM controls
document.getElementById('btn-next-step').addEventListener('click', () => {
    send({ type: 'advance_step' });
});
document.getElementById('btn-prev-step').addEventListener('click', () => {
    send({ type: 'prev_step' });
});

// Tab switching
document.querySelectorAll('.gm-tab').forEach(btn => {
    btn.addEventListener('click', () => {
        document.querySelectorAll('.gm-tab').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        const tab = btn.dataset.tab;
        document.getElementById('gm-table-view').style.display = tab === 'table' ? '' : 'none';
        document.getElementById('gm-quarters-view').style.display = tab === 'quarters' ? '' : 'none';
    });
});
</script>
</body>
</html>
