// ── DD-kort Modal ──
function showDDKortModal(fastNamn, kopeskilling) {
    var mc = document.getElementById('modal-container');
    var cards = S.ddData.filter(function(c) { return c.id; });
    var html = '<div class="modal-overlay"><div class="modal">';
    html += '<div class="modal-header" style="background:#1B365D"><h3 style="color:#D1CDC0">Due Diligence \u2014 ' + fastNamn + '</h3></div>';
    html += '<div class="modal-body">';
    html += '<div style="color:#999;font-size:13px;margin-bottom:12px">K\u00f6pt f\u00f6r <strong>' + kopeskilling + ' Mkr</strong>. Dra ett DD-kort f\u00f6r att se om n\u00e5got avviker.</div>';
    html += '<button id="btn-draw-dd" class="btn-primary" style="width:100%;padding:14px;font-size:16px;margin-bottom:12px">\uD83C\uDCCF Dra DD-kort</button>';
    html += '<div id="dd-result"></div>';
    html += '</div>';
    html += '<div class="modal-footer"><button class="btn-secondary" id="modal-dd-close" style="width:100%">St\u00e4ng</button></div>';
    html += '</div></div>';
    mc.innerHTML = html;
    mc.querySelector('#modal-dd-close').addEventListener('click', function() { mc.innerHTML = ''; });
    mc.querySelector('#btn-draw-dd').addEventListener('click', function() {
        if (!cards.length) { mc.innerHTML = ''; return; }
        var card = cards[Math.floor(Math.random() * cards.length)];
        var typColor = card.typ === 'Positiv' ? '#27ae60' : card.typ === 'Kostnad' ? '#e74c3c' : '#888';
        var effektHtml = '';
        if (card.effekt_mkr !== 0) {
            effektHtml = '<div style="font-size:18px;font-weight:700;color:' + typColor + ';margin:8px 0">' +
                (card.effekt_mkr > 0 ? '+' : '') + card.effekt_mkr + ' Mkr</div>';
        }
        var resultHtml = '<div style="background:#1a2736;border:2px solid ' + typColor + ';border-radius:8px;padding:12px">' +
            '<div style="color:' + typColor + ';font-size:11px;text-transform:uppercase;letter-spacing:1px;margin-bottom:4px">' + card.id + ' \u2014 ' + card.typ + '</div>' +
            '<div style="font-weight:700;font-size:16px;margin-bottom:6px">' + card.rubrik + '</div>' +
            '<div style="color:#aaa;font-size:13px;margin-bottom:8px">' + card.beskrivning + '</div>' +
            effektHtml +
            '</div>';
        if (card.effekt_mkr !== 0) {
            resultHtml += '<button id="btn-apply-dd" style="margin-top:10px;width:100%;padding:12px;background:' + typColor + ';color:white;border:none;border-radius:8px;font-size:14px;font-weight:700;cursor:pointer">' +
                'Applicera (' + (card.effekt_mkr > 0 ? '+' : '') + card.effekt_mkr + ' Mkr i EK)</button>';
        }
        document.getElementById('dd-result').innerHTML = resultHtml;
        document.getElementById('btn-draw-dd').style.display = 'none';
        var applyBtn = document.getElementById('btn-apply-dd');
        if (applyBtn) {
            applyBtn.addEventListener('click', function() {
                send({ type: 'update_assets', assets: { eget_kapital: (S.state.player.eget_kapital || 0) + card.effekt_mkr } });
                applyBtn.textContent = '\u2713 Applicerad';
                applyBtn.disabled = true;
                applyBtn.style.opacity = '0.5';
            });
        }
    });
}

function openPCModal() {
    const mc = document.getElementById('modal-container');
    let html = '<div class="modal-overlay"><div class="modal">';
    html += '<div class="modal-header"><h3>Välj Projektchef</h3></div>';
    html += '<div class="modal-body">';
    for (const pc of S.pcData) {
        const motstand = pc.handelsemotstand || 'ingen';
        const namnd = pc.namnd_bonus ? `, Nämnd +${pc.namnd_bonus}` : '';
        html += `<div class="modal-item" data-pc-id="${pc.id}">
            <div class="item-name">${pc.namn}</div>
            <div class="item-detail">${pc.specialisering} | Lindring: +${pc.kapacitet} (${motstand})${namnd} | Lön: ${pc.lon} Mkr</div>
            <div class="item-detail" style="margin-top:4px;color:#777">${pc.not_text || ''}</div>
        </div>`;
    }
    html += '</div>';
    html += '<div class="modal-footer"><button class="btn-secondary" id="modal-cancel">Avbryt</button></div>';
    html += '</div></div>';
    mc.innerHTML = html;

    mc.querySelectorAll('.modal-item').forEach(el => {
        el.addEventListener('click', () => {
            const pc = S.pcData.find(p => p.id === el.dataset.pcId);
            if (pc) send({ type: 'update_assets', assets: { projektchef: pc } });
            mc.innerHTML = '';
        });
    });
    mc.querySelector('#modal-cancel').addEventListener('click', () => { mc.innerHTML = ''; });
}

// ── Planning Modal ──
function openPlanningModal(stepId) {
    if (!S.planningData) return;
    var mc = document.getElementById('modal-container');
    var stepDef = S.planningData.steps.find(function(s) { return s.id === stepId; });
    if (!stepDef) return;
    var isSupplier = stepDef.type === 'supplier';
    var source = isSupplier ? S.planningData.suppliers : S.planningData.organisations;
    var levels = source[stepDef.key] || [];
    var currentChoice = (S.state.player.pl_choices || {})[stepId];

    var html = '<div class="modal-overlay"><div class="modal">';
    html += '<div class="modal-header"><h3>' + stepDef.name + '</h3></div>';
    html += '<div class="modal-body">';
    for (var i = 0; i < levels.length; i++) {

            var cost = isSupplier ? (lv.kostnad || (lv.klass_priser && lv.klass_priser.C) || 0) : (lv.kostnad_mkr || lv.kostnad || 0);

                name: stepDef.name, niva: lv.niva,

                erf: lv.erfarenhet || 0, cost: cost,
                rb: lv.riskbuffert || 0,
            };

// ── Project Modal ──
function openProjectModal(typ, triplePrice) {
    const mc = document.getElementById('modal-container');
    const available = S.projectData[typ] || [];
    const currentIds = new Set((S.state.player.projects || []).map(p => p.id));
    const priceLabel = triplePrice ? ' (3\u00d7 pris!)' : '';

    let html = '<div class="modal-overlay"><div class="modal">';
    html += '<div class="modal-header"><h3>' + typ + '-projekt' + priceLabel + '</h3></div>';
    html += '<div class="modal-body">';
    for (const proj of available) {
        const sel = currentIds.has(proj.id) ? ' selected' : '';
        const kostnad = triplePrice ? proj.kostnad * 3 : proj.kostnad;
        const projData = JSON.stringify(proj).replace(/'/g, "&#39;");
        html += '<div class="modal-item' + sel + '" data-proj=\'' + projData + '\'>' +
            '<div class="item-name">' + (proj.namn || proj.id) + '</div>' +
            '<div class="item-detail">BTA: ' + proj.bta + ' | Form: ' + proj.formfaktor +
            ' | Anskaff: ' + proj.anskaffning + ' Mkr | Kostnad: ' + kostnad + ' Mkr' +
            (triplePrice ? ' <span style="color:#e67e22">(3\u00d7)</span>' : '') + '</div>' +
            '</div>';
    }
    html += '</div>';
    html += '<div class="modal-footer"><button class="btn-secondary" id="modal-close">Stäng</button></div>';
    html += '</div></div>';
    mc.innerHTML = html;

    mc.querySelectorAll('.modal-item').forEach(el => {
        el.addEventListener('click', () => {
            const proj = JSON.parse(el.dataset.proj);
            const current = [...(S.state.player.projects || [])];
            const idx = current.findIndex(p => p.id === proj.id);
            if (idx >= 0) {
                current.splice(idx, 1);
                el.classList.remove('selected');
            } else {
                // If triple price: save modified project with 3× kostnad
                if (triplePrice) {
                    const modProj = Object.assign({}, proj, { kostnad: proj.kostnad * 3, triple_price: true });
                    current.push(modProj);
                } else {
                    current.push(proj);
                }
                el.classList.add('selected');
            }
            send({ type: 'update_assets', assets: { projects: current } });
        });
    });
    mc.querySelector('#modal-close').addEventListener('click', () => { mc.innerHTML = ''; });
}

// ── Quiz: Player Modal ──
function showQuizModal(question) {
    if (S.isGM) return;
    const mc = document.getElementById('quiz-modal-container');
    const timeLimit = question.time_limit || 30;
    const qType = question.type || 'text';
    let optionsHtml = '';
    if (qType === 'multiple_choice') {
        optionsHtml = '<div class="quiz-options">' +
            (question.options || []).map((opt, i) =>
                '<div class="quiz-option" data-idx="' + i + '">' + opt + '</div>'
            ).join('') + '</div>';
    } else {
        const inputType = qType === 'number' ? 'number' : 'text';
        const placeholder = qType === 'number' ? 'Ange siffra...' : 'Skriv ditt svar...';
        optionsHtml = '<div class="quiz-input-row">' +
            '<input type="' + inputType + '" id="quiz-answer-input" placeholder="' + placeholder + '" autocomplete="off">' +
            '<button id="quiz-submit-btn">Svara</button></div>';
    }
    mc.innerHTML = '<div class="quiz-overlay"><div class="quiz-modal">' +
        '<div class="quiz-header"><h3>Quiz</h3></div>' +
        '<div class="quiz-timer" id="quiz-timer">' + timeLimit + '</div>' +
        '<div class="quiz-timer-bar"><div class="fill" id="quiz-timer-bar-fill" style="width:100%"></div></div>' +
        '<div class="quiz-question-text">' + question.text + '</div>' +
        optionsHtml +
        '</div></div>';

    // Timer
    const startTime = Date.now();
    if (S._quizTimer) clearInterval(S._quizTimer);
    S._quizTimer = setInterval(() => {
        const elapsed = (Date.now() - startTime) / 1000;
        const remaining = Math.max(0, timeLimit - elapsed);
        const timerEl = document.getElementById('quiz-timer');
        const barEl = document.getElementById('quiz-timer-bar-fill');
        if (timerEl) {
            timerEl.textContent = Math.ceil(remaining);
            timerEl.className = 'quiz-timer' + (remaining < 5 ? ' urgent' : '');
        }
        if (barEl) barEl.style.width = (remaining / timeLimit * 100) + '%';
    }, 100);

    // Answer handlers
    if (qType === 'multiple_choice') {
        mc.querySelectorAll('.quiz-option').forEach(el => {
            el.addEventListener('click', () => {
                if (S._quizAnswered) return;
                S._quizAnswered = true;
                el.classList.add('selected');
                mc.querySelectorAll('.quiz-option').forEach(o => o.style.pointerEvents = 'none');
                send({ type: 'quiz_answer', answer: parseInt(el.dataset.idx) });
            });
        });
    } else {
        const submitBtn = mc.querySelector('#quiz-submit-btn');
        const inputEl = mc.querySelector('#quiz-answer-input');
        if (submitBtn && inputEl) {
            const doSubmit = () => {
                if (S._quizAnswered) return;
                const val = inputEl.value.trim();
                if (!val) return;
                S._quizAnswered = true;
                inputEl.disabled = true;
                submitBtn.disabled = true;
                const answer = qType === 'number' ? parseFloat(val) : val;
                send({ type: 'quiz_answer', answer: answer });
            };
            submitBtn.addEventListener('click', doSubmit);
            inputEl.addEventListener('keydown', (e) => { if (e.key === 'Enter') doSubmit(); });
            inputEl.focus();
        }
    }
}

function showQuizFeedback(data) {
    if (S._quizTimer) { clearInterval(S._quizTimer); S._quizTimer = null; }
    const mc = document.getElementById('quiz-modal-container');
    const modal = mc.querySelector('.quiz-modal');
    if (!modal) return;
    // Keep question visible, add feedback below
    const existing = modal.querySelector('.quiz-feedback');
    if (existing) return;
    const cls = data.correct ? 'correct' : 'wrong';
    const icon = data.correct ? '&#10004;' : '&#10008;';
    const text = data.correct
        ? icon + ' Rätt! +' + data.points_earned + ' poäng (' + data.time_taken + 's)'
        : icon + ' Fel! (' + data.time_taken + 's)';
    const feedbackDiv = document.createElement('div');
    feedbackDiv.className = 'quiz-feedback ' + cls;
    feedbackDiv.innerHTML = text;
    modal.appendChild(feedbackDiv);
}

function showQuizClosed(data) {
    if (S._quizTimer) { clearInterval(S._quizTimer); S._quizTimer = null; }

            '</div></div>';
    } else {
        // Show correct answer in existing modal
        const oldFeedback = modal.querySelector('.quiz-feedback');
        // Add correct answer reveal
        const revealDiv = document.createElement('div');
        revealDiv.style.cssText = 'text-align:center;padding:12px 16px;font-size:16px;color:#27ae60;font-weight:700;border-top:1px solid #334';
        revealDiv.innerHTML = 'Rätt svar: ' + (data.correct_answer || '');

    setTimeout(() => { mc.innerHTML = ''; }, 5000);

        html += '<span class="q-pts">' + (q.points || 100) + 'p</span>';
        html += '<span class="q-actions">';

            html += '<button class="quiz-edit-btn" data-qid="' + q.id + '">&#9998;</button>';

    container.querySelector('#quiz-score-toggle')?.addEventListener('change', () => {
        send({ type: 'quiz_toggle_score' });
    });
    container.querySelector('#quiz-close-btn')?.addEventListener('click', () => {
        send({ type: 'quiz_close' });
    });
    container.querySelector('#quiz-add-btn')?.addEventListener('click', () => {
        showQuizForm(null);
    });

        if (!name || !name.trim()) return;
        const questions = st.quiz_questions || [];
        if (!questions.length) { alert('Inga frågor att spara.'); return; }
        try {
            const res = await fetch('/api/companion/quiz-setups', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ name: name.trim(), questions })
            });
            const data = await res.json();
            if (data.ok) alert('Setup "' + name.trim() + '" sparad!');
            else alert('Fel: ' + (data.error || 'Okänt'));
        } catch(e) { alert('Kunde inte spara setup.'); }

        try {
            const res = await fetch('/api/companion/quiz-setups');

            if (!setups.length) { alert('Inga sparade setups.'); return; }
            showSetupLoadModal(setups);
        } catch(e) { alert('Kunde inte hämta setups.'); }
    });

        btn.addEventListener('click', () => {
            send({ type: 'quiz_send', question_id: btn.dataset.qid });
        });
    });
    container.querySelectorAll('.quiz-edit-btn').forEach(btn => {
        btn.addEventListener('click', () => {
            const q = questions.find(qq => qq.id === btn.dataset.qid);
            if (q) showQuizForm(q);
        });
    });
    container.querySelectorAll('.quiz-del-btn').forEach(btn => {
        btn.addEventListener('click', () => {
            if (confirm('Ta bort frågan?')) {
                send({ type: 'quiz_delete', question_id: btn.dataset.qid });
            }
        });
    });
}

function showSetupLoadModal(setups) {

        '<div class="modal-item" style="display:flex;justify-content:space-between;align-items:center">' +

        '</div></div>'
    ).join('');
    mc.innerHTML = '<div class="modal-overlay"><div class="modal">' +
        '<div class="modal-header"><h3>Ladda setup</h3></div>' +
        '<div class="modal-body">' + rows + '</div>' +
        '<div class="modal-footer"><button class="btn-secondary" id="setup-modal-close">Stäng</button></div>' +
        '</div></div>';
    mc.querySelector('#setup-modal-close').addEventListener('click', () => { mc.innerHTML = ''; });
    mc.querySelector('.modal-overlay').addEventListener('click', e => { if (e.target === e.currentTarget) mc.innerHTML = ''; });
    mc.querySelectorAll('.setup-load').forEach(btn => {
        btn.addEventListener('click', async () => {
            const name = btn.dataset.name;
            try {
                const res = await fetch('/api/companion/quiz-setups/' + encodeURIComponent(name));
                const data = await res.json();
                if (data.questions) {
                    send({ type: 'quiz_load_setup', questions: data.questions,
                           default_time_limit: data.default_time_limit || 30,
                           default_points: data.default_points || 100 });
                    mc.innerHTML = '';
                } else { alert('Kunde inte ladda setup.'); }
            } catch(e) { alert('Fel vid laddning.'); }
        });
    });
    mc.querySelectorAll('.setup-del').forEach(btn => {
        btn.addEventListener('click', async () => {
            if (!confirm('Ta bort setup "' + btn.dataset.name + '"?')) return;
            await fetch('/api/companion/quiz-setups/' + encodeURIComponent(btn.dataset.name), { method: 'DELETE' });
            btn.closest('.modal-item').remove();
        });

                '</div>';
        }
        optionsHtml += '</div><button type="button" id="qf-add-opt" class="btn-secondary" style="padding:4px 10px;font-size:12px;margin-top:4px">+ Alternativ</button>';
    } else if (q.type === 'number') {
        const corr = typeof q.correct === 'number' ? q.correct : '';
        const tol = q.tolerance || 0;
        optionsHtml = '<div class="form-row"><div><label>Rätt svar</label><input type="number" id="qf-correct-num" value="' + corr + '" step="any"></div>' +
            '<div><label>Tolerans (±)</label><input type="number" id="qf-tolerance" value="' + tol + '" step="any" min="0"></div></div>';
    } else {
        const corr = Array.isArray(q.correct) ? q.correct.join(', ') : (q.correct || '');
        optionsHtml = '<label>Godkända svar (kommaseparerade)</label><input type="text" id="qf-correct-text" value="' + corr.replace(/"/g, '&quot;') + '" placeholder="svar1, svar2">';
    }

    fc.innerHTML = '<div class="quiz-form">' +
        '<div style="display:flex;justify-content:space-between;align-items:center"><h4 style="color:#f0c929">' + (isEdit ? 'Redigera fråga' : 'Ny fråga') + '</h4>' +
        '<span style="cursor:pointer;color:#888" id="qf-close">&#10005;</span></div>' +
        '<label>Typ</label><select id="qf-type"><option value="multiple_choice"' + (q.type === 'multiple_choice' ? ' selected' : '') + '>Flerval</option>' +
        '<option value="number"' + (q.type === 'number' ? ' selected' : '') + '>Siffra</option>' +
        '<option value="text"' + (q.type === 'text' ? ' selected' : '') + '>Text</option></select>' +
        '<label>Fråga</label><textarea id="qf-text">' + (q.text || '') + '</textarea>' +
        '<div id="qf-answer-section">' + optionsHtml + '</div>' +
        '<div class="form-row"><div><label>Tidsgräns (sek)</label><input type="number" id="qf-timelimit" value="' + (q.time_limit || 30) + '" min="5" max="120"></div>' +
        '<div><label>Poäng</label><input type="number" id="qf-points" value="' + (q.points || 100) + '" min="1"></div></div>' +
        '<div style="display:flex;gap:8px;margin-top:12px">' +
        '<button class="btn-primary" id="qf-save" style="flex:1">' + (isEdit ? 'Spara' : 'Lägg till') + '</button>' +
        '<button class="btn-secondary" id="qf-cancel" style="flex:1">Avbryt</button></div>' +
        '</div>';

    // Type change → rebuild answer section
    fc.querySelector('#qf-type').addEventListener('change', () => {
        const newType = fc.querySelector('#qf-type').value;
        const tempQ = { ...q, type: newType };
        if (newType === 'multiple_choice' && !tempQ.options) tempQ.options = ['', ''];
        showQuizForm(tempQ);
    });

    fc.querySelector('#qf-close')?.addEventListener('click', () => { fc.innerHTML = ''; });
    fc.querySelector('#qf-cancel')?.addEventListener('click', () => { fc.innerHTML = ''; });

    // Add option button
    fc.querySelector('#qf-add-opt')?.addEventListener('click', () => {
        const optsDiv = fc.querySelector('#qf-options');
        if (!optsDiv) return;
        const count = optsDiv.querySelectorAll('.qf-opt').length;
        if (count >= 6) return;
        const row = document.createElement('div');
        row.style.cssText = 'display:flex;gap:6px;margin-bottom:4px;align-items:center';
        row.innerHTML = '<input type="radio" name="qf-correct" value="' + count + '">' +
            '<input type="text" class="qf-opt" placeholder="Alternativ ' + (count+1) + '" style="flex:1;width:auto;min-width:0">' +
            '<span style="cursor:pointer;color:#e74c3c" class="qf-remove-opt">&#10005;</span>';
        optsDiv.appendChild(row);
        wireRemoveOpts();
    });
    wireRemoveOpts();

    function wireRemoveOpts() {
        fc.querySelectorAll('.qf-remove-opt').forEach(x => {
            x.onclick = () => { x.parentElement.remove(); };
        });
    }

    // Save
    fc.querySelector('#qf-save').addEventListener('click', () => {
        const type = fc.querySelector('#qf-type').value;
        const text = fc.querySelector('#qf-text').value.trim();
        if (!text) { alert('Frågetext krävs'); return; }
        const time_limit = parseInt(fc.querySelector('#qf-timelimit').value) || 30;
        const points = parseInt(fc.querySelector('#qf-points').value) || 100;
        const newQ = { type, text, time_limit, points };
        if (type === 'multiple_choice') {
            const opts = Array.from(fc.querySelectorAll('.qf-opt')).map(el => el.value.trim()).filter(v => v);
            if (opts.length < 2) { alert('Minst 2 alternativ krävs'); return; }
            newQ.options = opts;
            const checked = fc.querySelector('input[name="qf-correct"]:checked');
            newQ.correct = checked ? parseInt(checked.value) : 0;
            if (newQ.correct >= opts.length) newQ.correct = 0;
        } else if (type === 'number') {
            newQ.correct = parseFloat(fc.querySelector('#qf-correct-num').value) || 0;
            newQ.tolerance = parseFloat(fc.querySelector('#qf-tolerance')?.value) || 0;
        } else {
            const raw = fc.querySelector('#qf-correct-text').value;
            newQ.correct = raw.split(',').map(s => s.trim()).filter(s => s);
            if (!newQ.correct.length) { alert('Minst ett godkänt svar krävs'); return; }
        }
        if (isEdit) {
            send({ type: 'quiz_edit', question_id: existing.id, question: newQ });
        } else {
            send({ type: 'quiz_add', question: newQ });
        }
        fc.innerHTML = '';
    });
}

function renderGM() {
    const st = S.state;
    if (!st) return;

    document.getElementById('gm-room-code').textContent = st.code;
    document.getElementById('gm-phase-name').textContent = st.phase_name || '—';
    document.getElementById('gm-step-name').textContent = st.step_name || '—';
    document.getElementById('gm-dashboard-link').href = '/companion/dashboard/' + st.code;

    // Omvärldskort panel removed — players handle manually in physical play mode
    var _omPanel = document.getElementById('gm-omvarld-panel');
    if (_omPanel) _omPanel.style.display = 'none';

    // Disable nav buttons if game finalized
    const prevBtn = document.getElementById('btn-prev-step');
    const nextBtn = document.getElementById('btn-next-step');
    const finishBtn = document.getElementById('btn-gm-finish');
    if (st.game_finalized) {
        if (prevBtn) { prevBtn.disabled = true; prevBtn.style.opacity = '0.4'; }
        if (nextBtn) { nextBtn.disabled = true; nextBtn.style.opacity = '0.4'; }
        if (finishBtn) { finishBtn.disabled = true; finishBtn.style.opacity = '0.4'; }
    }

    try { renderGMTable(st); } catch(e) { console.error('renderGMTable error:', e); }
    try { renderGMQuarters(st); } catch(e) { console.error('renderGMQuarters error:', e); }
    try { renderGMQuiz(st); } catch(e) { console.error('renderGMQuiz error:', e); }
}

function gmDrawOmvarld(stepId) {
    var cards = S.omvarldData.filter(function(c) { return c.id; });
    if (!cards.length) { alert('Omvärldskort ej laddade'); return; }
    var card = cards[Math.floor(Math.random() * cards.length)];
    send({ type: 'draw_omvarld', step_id: stepId, card: card });
}

function renderGMTable(st) {
    const table = document.getElementById('gm-player-table');
    const currentPhase = st.phase || 'phase1';
    const allPlayers = (st.quarters || []).flatMap(q =>
        q.players.map(p => ({ ...p, district: q.name }))
    );

    // Calculate projected scores for all players and rank them
    for (const p of allPlayers) {
        p._projScore = projectedScore(p, currentPhase);
    }
    // Sort a copy by score to assign ranks
    var ranked = allPlayers.slice().filter(function(p) { return p._projScore > 0; }).sort(function(a, b) { return b._projScore - a._projScore; });
    var totalRanked = ranked.length;
    for (var ri = 0; ri < ranked.length; ri++) {
        ranked[ri]._rank = ri + 1;
    }
    // Map rank back to allPlayers by id
    var rankMap = {};
    for (var ri = 0; ri < ranked.length; ri++) {
        rankMap[ranked[ri].id] = ranked[ri]._rank;
    }

    const maxScore = Math.max(1, ...allPlayers.map(p => p._projScore || 0));

    let html = '<thead><tr>' +
        '<th>Stadsdel</th><th>Kvarter</th><th>Spelare</th><th>Status</th>' +
        '<th>PC</th><th>Projekt</th><th>Q</th><th>H</th><th>Rb</th>' +
        '<th>Vinstchans</th>' +
        '</tr></thead><tbody>';

    for (const p of allPlayers) {
        var done = p.step_done;
        var hasData = p.step_has_data;
        var statusIcon, statusColor;
        if (done) { statusIcon = '\uD83D\uDFE2'; statusColor = '#27ae60'; }
        else if (hasData) { statusIcon = '\uD83D\uDFE1'; statusColor = '#f0c929'; }
        else { statusIcon = '\uD83D\uDD34'; statusColor = '#c0392b'; }
        var pcName = p.projektchef ? p.projektchef.namn : '\u2014';
        var numProj = p.projects ? p.projects.length : 0;
        var score = p._projScore || 0;
        var barW = Math.round((score / maxScore) * 60);
        var prevScore = p.prev_profit_score || 0;
        var pRank = rankMap[p.id] || 0;
        var tier = getTier(score);

        // Build enhanced VINSTCHANS cell: #1 medal score arrow tier-dot
        var vinstHtml = '';
        if (pRank > 0) {
            var medals = {1: '\uD83E\uDD47', 2: '\uD83E\uDD48', 3: '\uD83E\uDD49'};
            var medal = medals[pRank] || '';
            vinstHtml += '<span style="color:' + rankColor(pRank) + ';font-weight:700">#' + pRank + '</span> ';
            if (medal) vinstHtml += medal + ' ';
        }
        vinstHtml += '<span class="score-bar" style="width:' + barW + 'px"></span>';
        vinstHtml += renderTrendScore(score, prevScore);
        if (score > 0) {
            vinstHtml += ' <span style="color:' + tier.color + '" title="' + tier.label + '">' + tier.emoji + '</span>';
        }

        html += '<tr>' +
            '<td>' + p.district + '</td>' +
            '<td style="color:#f0c929">' + (p.block_name || '\u2014') + '</td>' +
            '<td>' + p.name + '</td>' +
            '<td style="color:' + statusColor + '">' + statusIcon + '</td>' +
            '<td>' + pcName + '</td>' +
            '<td>' + numProj + '</td>' +
            '<td>' + p.q_krav + '</td>' +
            '<td>' + p.h_krav + '</td>' +
            '<td>' + p.riskbuffertar + '</td>' +
            '<td>' + vinstHtml + '</td>' +
            '</tr>';
    }
    html += '</tbody>';
    table.innerHTML = html;
}

function renderGMQuarters(st) {
    const grid = document.getElementById('gm-quarters');
    if (!grid) return;
    const quarters = st.quarters || [];
    const currentPhase = st.phase || 'phase1';

    // Compute average projected score per quarter for district ranking
    var distScores = [];
    for (var di = 0; di < quarters.length; di++) {
        var dps = (quarters[di].players || []).filter(function(p) { return p.projects && p.projects.length > 0; });
        var avgS = 0;
        if (dps.length > 0) {
            var sum = 0;
            for (var dj = 0; dj < dps.length; dj++) { sum += projectedScore(dps[dj], currentPhase); }
            avgS = Math.round(sum / dps.length * 10) / 10;
        }
        distScores.push({ idx: di, avgScore: avgS });
    }
    // Rank districts
    var distRanked = distScores.slice().filter(function(d) { return d.avgScore > 0; }).sort(function(a, b) { return b.avgScore - a.avgScore; });
    var distRankMap = {};
    var totalDistricts = distRanked.length;
    for (var dri = 0; dri < distRanked.length; dri++) {
        distRankMap[distRanked[dri].idx] = dri + 1;
    }

    const cards = [];
    for (let i = 0; i < quarters.length; i++) {
        const q = quarters[i];
        const ps = q.players || [];
        const done = ps.filter(function(p) { return p.step_done; }).length;
        const total = ps.length;
        const doneColor = (done === total && total > 0) ? '#27ae60' : (done > 0 ? '#f0c929' : '#c0392b');
        const playerSpans = ps.map(function(p) {
            var icon, c;
            if (p.step_done) { icon = '\uD83D\uDFE2'; c = '#27ae60'; }
            else if (p.step_has_data) { icon = '\uD83D\uDFE1'; c = '#f0c929'; }
            else { icon = '\uD83D\uDD34'; c = '#c0392b'; }
            return '<span style="color:' + c + '">' + icon + ' ' + p.name + '</span>';
        }).join('');

        // District ranking info
        var dAvg = distScores[i].avgScore;
        var dRank = distRankMap[i] || 0;
        var dTier = getTier(dAvg);
        var distRankHtml = '';
        if (dAvg > 0) {
            distRankHtml = '<div class="quarter-stat"><span>Vinstchans (snitt)</span><span class="val">' +
                '<span style="color:' + rankColor(dRank) + ';font-weight:700">#' + dRank + ' av ' + totalDistricts + '</span> ' +
                '<span style="font-weight:700">' + dAvg + '</span> ' +
                '<span style="color:' + dTier.color + '">' + dTier.emoji + '</span>' +
                '</span></div>';
        }

        cards.push(
            '<div class="quarter-card">' +
            '<h3><span class="q-name" data-qi="' + q.quarter_idx + '" style="cursor:pointer;border-bottom:1px dashed #666">' + q.name + '</span> ' +
            '<span style="color:#888;font-size:13px">(' + total + '/4)</span>' +
            '<span style="float:right;font-size:13px;color:' + doneColor + '">' + done + '/' + total + ' klara</span></h3>' +
            '<div class="quarter-stat" style="margin-bottom:6px"><span>Stadsdelskod</span><span class="val" style="color:#f0c929;letter-spacing:2px;font-size:16px">' + (q.code || '\u2014') + '</span></div>' +
            distRankHtml +
            '<div class="quarter-stat"><span>Projekt</span><span class="val">' + q.total_projects + '</span></div>' +
            '<div class="quarter-stat"><span>Total BTA</span><span class="val">' + q.total_bta + ' kvm</span></div>' +
            '<div class="quarter-stat"><span>Snitt Q-krav</span><span class="val">' + q.avg_q_krav + '</span></div>' +
            '<div class="quarter-stat"><span>Snitt H-krav</span><span class="val">' + q.avg_h_krav + '</span></div>' +
            '<div class="quarter-players">' + playerSpans + '</div>' +
            '</div>'
        );
    }
    grid.innerHTML = cards.join('');
    grid.querySelectorAll('.q-name').forEach(function(el) {
        el.addEventListener('click', function() {
            const qi = parseInt(el.dataset.qi);
            const current = el.textContent;
            const newName = prompt('Nytt stadsdelsnamn:', current);
            if (newName && newName.trim()) {
                send({ type: 'rename_quarter', quarter_idx: qi, name: newName.trim() });
            }
        });
    });
}

// GM controls
document.getElementById('btn-next-step').addEventListener('click', () => {
    send({ type: 'advance_step' });
    // Force refresh state with retries to catch missed broadcasts
    setTimeout(() => send({ type: 'get_state' }), 200);
    setTimeout(() => send({ type: 'get_state' }), 800);
});
document.getElementById('btn-prev-step').addEventListener('click', () => {
    send({ type: 'prev_step' });
    setTimeout(() => send({ type: 'get_state' }), 200);
    setTimeout(() => send({ type: 'get_state' }), 800);
});

// GM Reset
var _resetBtn = document.getElementById('btn-gm-reset');
if (_resetBtn) _resetBtn.addEventListener('click', async () => {
    if (!confirm('Vill du nollställa hela sessionen? Alla spelare kopplas bort och all data raderas.')) return;
    if (!confirm('Är du säker? Detta kan inte ångras.')) return;
    const code = S.roomCode, gmId = S.playerId;
    if (S.ws) { try { S.ws.close(); } catch(e) {} S.ws = null; }
    sessionStorage.removeItem('pmopoly_companion');
    try {
        await fetch('/api/companion/rooms/' + code + '?gm_id=' + gmId, { method: 'DELETE' });
    } catch(e) {}
    window.location.href = '/companion/gm';
});

// GM Finish Game
var _finishBtn = document.getElementById('btn-gm-finish');
if (_finishBtn) _finishBtn.addEventListener('click', () => {
    if (S.state?.game_finalized) return;
    if (!confirm('Avsluta spelet och spara resultaten?\n\nQuiz och dashboard förblir aktiva.')) return;
    send({ type: 'finalize_game' });
    alert('Spelet avslutat! Resultat sparade.\n\nQuiz och dashboard är fortfarande aktiva.\nSe Analytics för historik.');
});

// Tab switching
document.querySelectorAll('.gm-tab').forEach(btn => {
    btn.addEventListener('click', () => {
        document.querySelectorAll('.gm-tab').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        const tab = btn.dataset.tab;
        document.getElementById('gm-table-view').style.display = tab === 'table' ? '' : 'none';
        document.getElementById('gm-quarters-view').style.display = tab === 'quarters' ? '' : 'none';
        document.getElementById('gm-quiz-view').style.display = tab === 'quiz' ? '' : 'none';
    });
});

// Leave button
document.getElementById('btn-leave-player').addEventListener('click', () => {
    if (confirm('Vill du lämna spelet?')) {
        clearSession();
        if (S.ws) { S.ws.close(); S.ws = null; }
        showView('view-lobby');
    }
});
